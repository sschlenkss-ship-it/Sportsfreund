<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --glow: #ff4500; --tint: rgba(255,69,0,0.2); --iris: #55b5ff; }
        body { margin: 0; background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white; }
        
        #sportsfreund-stage { 
            position: relative; width: 320px;
            filter: drop-shadow(0 0 3px var(--glow)) drop-shadow(0 0 8px var(--glow)); 
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #cloud-tint { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--tint); mix-blend-mode: color; pointer-events: none; border-radius: 50%; }
        
        /* Augen: Gläserner Look */
        .eye-ball { fill: #fff; }
        .iris { fill: url(#eyeGrad); transition: fill 0.6s; }
        .pupil { fill: #000; }
        .shine { fill: #fff; opacity: 0.8; }
        .lid { fill: #030406; opacity: 0; transition: opacity 0.4s; }
        
        /* Mund & Zähne */
        .mouth-path { stroke: #1a2233; stroke-width: 8; fill: none; stroke-linecap: round; transition: all 0.5s ease; }
        .teeth { fill: #fff; opacity: 0; transition: opacity 0.5s; }
        
        /* Glitzer-Animation */
        @keyframes sparkle { 0%, 100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
        .glitter { fill: gold; animation: sparkle 1.5s infinite; }
    </style>
</head>
<body>

    <div style="background:#1a2233; padding:15px; border-radius:10px; margin-bottom:20px;">
        Schritte: <input type="number" id="stepInput" value="0" oninput="updateState()">
    </div>

    <div id="sportsfreund-stage">
        <img src="wolke1.png" style="width:100%; display:block;">
        <div id="cloud-tint"></div>
        
        <svg viewBox="0 0 200 100" style="position:absolute; top:0; left:0; width:100%; height:100%;">
            <defs>
                <radialGradient id="eyeGrad"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="var(--iris)"/></radialGradient>
            </defs>
            <g id="eyeL"><circle cx="65" cy="45" r="24" class="eye-ball"/><circle cx="65" cy="45" r="14" class="iris"/><circle cx="68" cy="42" r="6" class="pupil"/><path id="lidL" d="M 40,45 Q 65,25 90,45" class="lid"/></g>
            <g id="eyeR"><circle cx="135" cy="45" r="24" class="eye-ball"/><circle cx="135" cy="45" r="14" class="iris"/><circle cx="138" cy="42" r="6" class="pupil"/><path id="lidR" d="M 110,45 Q 135,25 160,45" class="lid"/></g>
            
            <path id="mouth" class="mouth-path" d="M 70,85 Q 100,70 130,85"/>
            <rect id="teeth" x="85" y="75" width="30" height="10" rx="2" class="teeth"/>
            <circle id="star" cx="135" cy="70" r="3" class="glitter" opacity="0"/>
        </svg>
    </div>

    <script>
        function updateState() {
            const steps = parseInt(document.getElementById('stepInput').value);
            const root = document.documentElement;
            const mouth = document.getElementById('mouth');
            const lids = [document.getElementById('lidL'), document.getElementById('lidR')];
            const teeth = document.getElementById('teeth');
            const star = document.getElementById('star');
            
            let c;
            if (steps < 2000) c = {g:'#ff4500', t:'rgba(255,69,0,0.2)', m:'M 70,85 Q 100,70 130,85', l:1, i:'#55b5ff', th:0, st:0};
            else if (steps < 5000) c = {g:'#3b82f6', t:'rgba(59,130,246,0.2)', m:'M 70,80 Q 100,85 130,80', l:0.5, i:'#55b5ff', th:0, st:0};
            else if (steps < 8000) c = {g:'#32cd32', t:'rgba(50,205,50,0.1)', m:'M 70,80 Q 100,95 130,80', l:0, i:'#2ecc71', th:0, st:0};
            else if (steps < 10000) c = {g:'#ffa500', t:'rgba(255,165,0,0.1)', m:'M 70,75 Q 100,105 130,75', l:0, i:'#2ecc71', th:0.8, st:0};
            else c = {g:'#ffd700', t:'rgba(255,215,0,0.1)', m:'M 60,70 Q 100,115 140,70', l:0, i:'#27ae60', th:1, st:1};

            root.style.setProperty('--glow', c.g);
            root.style.setProperty('--tint', c.t);
            root.style.setProperty('--iris', c.i);
            mouth.setAttribute('d', c.m);
            teeth.style.opacity = c.th;
            star.style.opacity = c.st;
            lids.forEach(l => l.style.opacity = c.l);
        }
    </script>
</body>
</html>
