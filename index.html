<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --glow-color: #ff4500; --mouth-path: "M 70,85 Q 100,70 130,85"; }
        
        body { margin: 0; background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white; }
        
        #simulator { background: #1a2233; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #55b5ff; }
        
        #sportsfreund-stage { 
            position: relative; width: 300px;
            /* Dynamisches Leuchten */
            filter: drop-shadow(0 0 1px var(--glow-color)) drop-shadow(0 0 1px var(--glow-color)) 
                    drop-shadow(0 0 15px var(--glow-color)); 
            transition: filter 0.5s ease;
        }
        
        #cloud-asset { width: 100%; display: block; }
        .face-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        @keyframes blink { 0%, 9%, 11%, 100% { transform: scaleY(1); } 10% { transform: scaleY(0.1); } }
        .eye-group { animation: blink 5s infinite; transform-origin: 50% 45%; }
        
        .eye-ball { fill: white; transition: all 0.3s ease; }
        .iris { fill: #55b5ff; }
        .pupil { fill: black; }
        .shine { fill: white; opacity: 0.6; }
        .mouth-path { stroke: #1a2233; stroke-width: 6; fill: none; stroke-linecap: round; transition: all 0.3s ease; }
        
        /* Das Augenlid für traurige Emotion */
        .lid { fill: none; stroke: #030406; stroke-width: 8; stroke-linecap: round; opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body>

    <div id="simulator">
        <label>Schritte: <input type="number" id="stepInput" value="0" oninput="updateState()"></label>
    </div>

    <div id="sportsfreund-stage">
        <img id="cloud-asset" src="wolke1.png" alt="Sportsfreund">
        <svg class="face-layer" viewBox="0 0 200 100">
            <g class="eye-group">
                <circle cx="65" cy="45" r="24" class="eye-ball"/>
                <circle cx="65" cy="45" r="14" class="iris"/>
                <circle id="pupilL" cx="68" cy="42" r="6" class="pupil"/>
                <path id="lidL" d="M 45,45 Q 65,30 85,45" class="lid"/>
            </g>
            <g class="eye-group">
                <circle cx="135" cy="45" r="24" class="eye-ball"/>
                <circle cx="135" cy="45" r="14" class="iris"/>
                <circle id="pupilR" cx="138" cy="42" r="6" class="pupil"/>
                <path id="lidR" d="M 115,45 Q 135,30 155,45" class="lid"/>
            </g>
            <path id="mouth" class="mouth-path" d="M 70,85 Q 100,70 130,85"/>
        </svg>
    </div>

    <script>
        function updateState() {
            const steps = parseInt(document.getElementById('stepInput').value);
            const stage = document.getElementById('sportsfreund-stage');
            const mouth = document.getElementById('mouth');
            const lidL = document.getElementById('lidL');
            const lidR = document.getElementById('lidR');
            
            // Logik: Lava-Rot (0) -> Gold (10.000)
            let hue = Math.min(steps / 10000 * 45, 45); // 0 (rot) bis 45 (gold)
            document.documentElement.style.setProperty('--glow-color', steps < 500 ? '#ff4500' : 'gold');

            if (steps < 2000) { // Traurig
                mouth.setAttribute('d', 'M 70,85 Q 100,70 130,85');
                lidL.style.opacity = lidR.style.opacity = 1;
            } else if (steps < 10000) { // Neutral
                mouth.setAttribute('d', 'M 70,80 Q 100,95 130,80');
                lidL.style.opacity = lidR.style.opacity = 0;
            } else { // Mega Happy
                mouth.setAttribute('d', 'M 60,70 Q 100,105 140,70');
                lidL.style.opacity = lidR.style.opacity = 0;
            }
        }
    </script>
</body>
</html>
