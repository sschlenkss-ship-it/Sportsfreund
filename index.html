<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --main-color: #ff4500; --pastell: rgba(255, 69, 0, 0.2); }
        body { margin: 0; background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        #sportsfreund-stage { position: relative; width: 320px; }
        
        /* Fette Vektor-Kontur um die Wolke */
        .svg-outline { 
            position: absolute; top: -10px; left: -10px; width: 340px; height: 340px; 
            pointer-events: none; z-index: 0;
        }
        .outline-path { stroke: var(--main-color); stroke-width: 15; fill: none; stroke-linejoin: round; }
        
        /* Wolken-Tönung */
        #cloud-tint { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--pastell); mix-blend-mode: color; border-radius: 50%; pointer-events: none; 
        }

        /* Gesicht */
        .face-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        
        @keyframes blink { 0%, 9%, 11%, 100% { transform: scaleY(1); } 10% { transform: scaleY(0.1); } }
        .eye-group { animation: blink 5s infinite; transform-origin: center; }
        
        .eye-ball { fill: #fff; }
        .iris { fill: #33a1de; }
        .pupil { fill: #000; }
        .glare { fill: #fff; opacity: 0.8; }
        
        .mouth-bg { transition: d 0.4s ease; }
    </style>
</head>
<body>

    <div style="margin-bottom:20px;">
        Schritte: <input type="number" id="stepInput" value="0" oninput="updateState()">
    </div>

    <div id="sportsfreund-stage">
        <svg class="svg-outline" viewBox="0 0 100 100">
            <path d="M 20,50 Q 20,20 50,20 Q 80,20 80,50 Q 80,80 50,80 Q 20,80 20,50" class="outline-path"/>
        </svg>

        <img src="wolke1.png" style="width:100%; display:block; position:relative; z-index:1;">
        <div id="cloud-tint"></div>
        
        <svg class="face-layer" viewBox="0 0 200 100">
            <g class="eye-group" transform="translate(65, 45) scale(0.9)">
                <circle r="24" class="eye-ball"/><circle r="12" class="iris"/><circle r="5" class="pupil"/><ellipse cx="-4" cy="-4" rx="3" ry="4" class="glare"/>
            </g>
            <g class="eye-group" transform="translate(135, 45) scale(0.9)">
                <circle r="24" class="eye-ball"/><circle r="12" class="iris"/><circle r="5" class="pupil"/><ellipse cx="-4" cy="-4" rx="3" ry="4" class="glare"/>
            </g>
            <path id="mouth-bg" class="mouth-bg" d="M 70,85 Q 100,75 130,85 Z" fill="#2b0c0c"/>
        </svg>
    </div>

    <script>
        function updateState() {
            const steps = parseInt(document.getElementById('stepInput').value);
            const root = document.documentElement;
            const mouth = document.getElementById('mouth-bg');
            
            let c;
            if (steps < 2000) c = { col: '#b22222', pastell: 'rgba(178,34,34,0.3)', m: 'M 70,88 Q 100,80 130,88 Z' }; // Dunkelrot
            else if (steps < 5000) c = { col: '#4169e1', pastell: 'rgba(65,105,225,0.2)', m: 'M 70,85 Q 100,82 130,85 Z' }; // Blau
            else if (steps < 8000) c = { col: '#32cd32', pastell: 'rgba(50,205,50,0.2)', m: 'M 70,80 Q 100,90 130,80 Z' }; // Grün
            else if (steps < 10000) c = { col: '#ffa500', pastell: 'rgba(255,165,0,0.2)', m: 'M 70,75 Q 100,105 130,75 Z' }; // Orange
            else c = { col: '#ffd700', pastell: 'rgba(255,215,0,0.2)', m: 'M 60,70 Q 100,115 140,70 Z' }; // Gold

            root.style.setProperty('--main-color', c.col);
            root.style.setProperty('--pastell', c.pastell);
            mouth.setAttribute('d', c.m);
        }
    </script>
</body>
</html>
