<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportfreund Dashboard</title>
    <style>
        body { background-color: #030303; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        #smiley-view { display: flex; align-items: center; justify-content: center; height: 100vh; }
        #smiley-display { width: 250px; cursor: pointer; filter: url(#main-glow); transition: all 0.3s; }
        #dashboard-view { display: none; padding: 20px; height: 100vh; overflow-y: auto; background: #0a0a0a; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 20px; }
        th { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px; background: #161616; vertical-align: middle; border-bottom: 1px solid #222; }
        .sm-icon { width: 40px; height: 40px; filter: url(#friend-outline); border-radius: 50%; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        button { background: #FFD700; color: #000; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<svg width="0" height="0">
    <defs>
        <filter id="main-glow"><feMorphology in="SourceAlpha" operator="dilate" radius="10" result="dilated"/><feFlood flood-color="#FFD700"/><feComposite in2="dilated" operator="in"/><feGaussianBlur stdDeviation="15"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="friend-outline"><feMorphology in="SourceAlpha" operator="dilate" radius="1.5"/><feFlood flood-color="#FFF"/><feComposite in2="dilated" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
</svg>

<div id="smiley-view">
    <img src="Smiley4.png" id="smiley-display" alt="Sportfreund" ondblclick="toggleDashboard()">
</div>

<div id="dashboard-view">
    <div class="header">
        <h1>Freunde-Ranking</h1>
        <button onclick="toggleDashboard()">Zurück</button>
    </div>
    <table id="friends-table">
        <tr><th>Status</th><th>Name</th><th>Schritte</th><th>kcal</th><th>Sportmin.</th><th>Punkte</th></tr>
    </table>
</div>

<script>
    // Emotion-Farben: 1 (Traurig/Rot) bis 8 (Glücklich/Sterne/Gold)
    const statusColors = ["#FF0000", "#FF4500", "#FF8C00", "#EEDD00", "#32CD32", "#00FF00", "#00DFFF", "#FFD700"];

    function getSmileyLevel(steps, kcal, sportMin) {
        // Kern-Logik: Sport-Bonus
        // 1 Stunde Sport = ca. 3000 zusätzliche "Erfolgs-Schritte"
        let sportBonus = (sportMin * 50) + (kcal * 2);
        let totalEffect = steps + sportBonus;

        // 0-2000: Stufe 1 (Traurig)
        // 10000: Stufe 7 (Glücklich)
        // 15000+: Stufe 8 (Sterne/Gold)
        if (totalEffect < 2000) return 1;
        if (totalEffect < 4000) return 2;
        if (totalEffect < 6000) return 3;
        if (totalEffect < 8000) return 4;
        if (totalEffect < 10000) return 5;
        if (totalEffect < 12000) return 6;
        if (totalEffect < 15000) return 7;
        return 8;
    }

    const friends = [
        { name: "Max", steps: 15200, kcal: 850, sportMin: 60 },
        { name: "Anna", steps: 5000, kcal: 600, sportMin: 120 }, // Viel Sport, gleicht Schritte aus!
        { name: "Tim", steps: 3000, kcal: 200, sportMin: 0 }
    ];

    function renderFriends() {
        const table = document.getElementById('friends-table');
        friends.forEach(f => {
            let lvl = getSmileyLevel(f.steps, f.kcal, f.sportMin);
            table.innerHTML += `
                <tr>
                    <td><img src="Smiley${lvl}.png" class="sm-icon" style="filter: drop-shadow(0 0 8px ${statusColors[lvl-1]})"></td>
                    <td>${f.name}</td>
                    <td>${f.steps.toLocaleString()}</td>
                    <td>${f.kcal}</td>
                    <td>${f.sportMin}</td>
                    <td>${Math.floor(f.steps + (f.kcal*2) + (f.sportMin*50))}</td>
                </tr>
            `;
        });
    }

    function toggleDashboard() {
        const smileyView = document.getElementById('smiley-view');
        const dashView = document.getElementById('dashboard-view');
        dashView.style.display = (dashView.style.display === 'none' || dashView.style.display === '') ? 'block' : 'none';
        smileyView.style.display = (dashView.style.display === 'block') ? 'none' : 'flex';
    }

    renderFriends();
</script>
</body>
</html>
