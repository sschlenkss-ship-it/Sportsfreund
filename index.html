<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        #smiley-container { width: 300px; }
        
        /* Animation: Blinzeln */
        @keyframes blinzeln { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0); } }
        #augen-gruppe { animation: blinzeln 5s infinite; transform-origin: 150px 150px; }
        
        /* Übergänge für Farbe und Mund */
        #smiley-body { transition: fill 0.8s ease; }
        #mouth { transition: d 0.5s ease; }
    </style>
</head>
<body>

    <div style="color: white; margin-bottom: 20px;">
        Schritte: <input type="number" id="stepInput" value="0" oninput="updateSmiley(this.value)">
    </div>

    <div id="smiley-container">
        <svg viewBox="0 0 300 300" id="smiley-svg">
            <circle id="smiley-body" cx="150" cy="150" r="140" fill="#FFD700" stroke="#B8860B" stroke-width="5" />
            <g id="augen-gruppe">
                <circle cx="100" cy="120" r="20" fill="white" /><circle cx="100" cy="120" r="10" fill="black" />
                <circle cx="200" cy="120" r="20" fill="white" /><circle cx="200" cy="120" r="10" fill="black" />
            </g>
            <path id="mouth" d="M 100,220 Q 150,220 200,220" stroke="black" stroke-width="10" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <script>
        function updateSmiley(s) {
            const body = document.getElementById('smiley-body');
            const mouth = document.getElementById('mouth');

            // 1. Farbe steuern
            if (s < 2000) body.setAttribute('fill', '#8B0000'); // Dunkelrot
            else if (s < 8000) body.setAttribute('fill', '#22c55e'); // Grün
            else body.setAttribute('fill', '#FFD700'); // Gold

            // 2. Mund animieren (Q-Kurve)
            let curve = 220 + (s / 50); // Lächeln wird bei Schritten größer
            if (s < 1000) curve = 240; // Leicht traurig
            mouth.setAttribute('d', `M 100,220 Q 150,${curve} 200,220`);
        }
    </script>
</body>
</html>
