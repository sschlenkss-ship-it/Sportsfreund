<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportfreund Dashboard</title>
    <style>
        body { background-color: #030303; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        #smiley-view { display: flex; align-items: center; justify-content: center; height: 100vh; }
        #smiley-display { width: 250px; cursor: pointer; filter: url(#main-glow); transition: all 0.3s; }

        #dashboard-view { display: none; padding: 20px; height: 100vh; overflow-y: auto; background: #0a0a0a; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 20px; }
        th { color: #888; font-size: 0.7rem; text-transform: uppercase; text-align: center; }
        td { padding: 8px; background: #161616; text-align: center; border-bottom: 1px solid #222; }
        .sm-icon { width: 40px; height: 40px; border-radius: 50%; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        button { background: #FFD700; color: #000; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<svg width="0" height="0">
    <defs>
        <filter id="main-glow"><feMorphology in="SourceAlpha" operator="dilate" radius="10" result="dilated"/><feFlood flood-color="#FFD700"/><feComposite in2="dilated" operator="in"/><feGaussianBlur stdDeviation="15"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
</svg>

<div id="smiley-view">
    <img src="Smiley4.png" id="smiley-display" alt="Sportfreund" ondblclick="toggleDashboard()">
</div>

<div id="dashboard-view">
    <div class="header">
        <h1>Ranking</h1>
        <button onclick="toggleDashboard()">Zurück</button>
    </div>
    <table id="friends-table">
        <tr><th>Status</th><th>Name</th><th>Schritte</th><th>kcal</th><th>Min.</th><th>Punkte</th></tr>
    </table>
</div>

<script>
    // Farben: 1 (Lavarot/Traurig) -> 8 (Gold/Glücklich)
    const statusColors = ["#FF0000", "#FF4500", "#FF8C00", "#EEDD00", "#32CD32", "#00FF00", "#00DFFF", "#FFD700"];

    function calculateData(steps, kcal, sportMin) {
        let total = steps + (kcal * 2) + (sportMin * 50);
        let pts = Math.floor(total / 20); // Kompakter Bereich 0-999
        
        // Stufe 1 (Traurig) bei 0 Pkt, Stufe 8 (Glücklich) bei 800+ Pkt
        let lvl = Math.min(8, Math.max(1, Math.floor(pts / 100) + 1));
        return { pts, lvl };
    }

    const friends = [
        { name: "Max", steps: 15200, kcal: 850, sportMin: 60 },
        { name: "Anna", steps: 5000, kcal: 600, sportMin: 120 },
        { name: "Tim", steps: 3000, kcal: 200, sportMin: 0 }
    ];

    function renderFriends() {
        const table = document.getElementById('friends-table');
        friends.forEach(f => {
            let data = calculateData(f.steps, f.kcal, f.sportMin);
            // Drop-shadow Farbe entspricht jetzt exakt dem Status
            table.innerHTML += `
                <tr>
                    <td><img src="Smiley${data.lvl}.png" class="sm-icon" style="filter: drop-shadow(0 0 5px ${statusColors[data.lvl-1]})"></td>
                    <td>${f.name}</td>
                    <td>${f.steps.toLocaleString()}</td>
                    <td>${f.kcal}</td>
                    <td>${f.sportMin}</td>
                    <td style="font-weight:bold; color:${statusColors[data.lvl-1]}">${data.pts}</td>
                </tr>
            `;
        });
    }

    function toggleDashboard() {
        const smileyView = document.getElementById('smiley-view');
        const dashView = document.getElementById('dashboard-view');
        dashView.style.display = (dashView.style.display === 'none' || dashView.style.display === '') ? 'block' : 'none';
        smileyView.style.display = (dashView.style.display === 'block') ? 'none' : 'flex';
    }

    renderFriends();
</script>
</body>
</html>
