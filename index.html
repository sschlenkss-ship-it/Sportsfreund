<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportsfreund</title>
    <style>
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #0f111a 0%, #030406 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #sportsfreund-stage {
            width: 250px; height: 200px; position: relative;
        }
        #cloud-asset {
            width: 100%; height: 100%; object-fit: contain;
            transition: filter 0.8s ease;
        }
        #status-text {
            color: white; font-family: sans-serif; margin-top: 20px; font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="sportsfreund-stage">
        <img id="cloud-asset" src="wolke1.png" alt="Sportsfreund">
    </div>
    <div id="status-text">Lade Sensordaten...</div>

    <script>
        // Hier kommt später die Health-Connect-Logik rein.
        // Aktuell simulieren wir den Gesundheits-Check:
        function updateSportsfreund(schritte) {
            const cloud = document.getElementById('cloud-asset');
            const text = document.getElementById('status-text');

            if (schritte < 3000) {
                cloud.style.filter = "hue-rotate(320deg) saturate(1.5)"; // Alarm-Rot
                text.innerText = "Dein Sportsfreund braucht Bewegung! (" + schritte + " Schritte)";
            } else if (schritte < 8000) {
                cloud.style.filter = "hue-rotate(70deg) saturate(1.1)"; // Aktiv-Grün
                text.innerText = "Weiter so! (" + schritte + " Schritte)";
            } else {
                cloud.style.filter = "none"; // Gold/Standard
                text.innerText = "Ziel erreicht! (" + schritte + " Schritte)";
            }
        }

        // Test-Aufruf: Simulation von 2500 Schritten
        updateSportsfreund(2500);
    </script>
</body>
</html>
