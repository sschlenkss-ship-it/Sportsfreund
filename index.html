<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        .container { position: relative; width: 300px; }
        #original-smiley { width: 100%; display: block; }
        
        /* Die Farbschicht für den Körper (überlagert Gold, lässt Blau in Ruhe) */
        #farb-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            mix-blend-mode: color; /* Nur die Farbe wird geändert, nicht die Helligkeit/Struktur */
            pointer-events: none;
        }

        /* Mund & Lider (Animierte Ebenen) */
        #animation-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <img src="button_105105.svg" id="original-smiley">
        
        <div id="farb-overlay"></div>

        <div id="animation-layer">
            <svg width="300" height="300">
                <path id="anim-mund" d="M 80,200 Q 150,200 220,200" stroke="black" stroke-width="8" fill="none" />
            </svg>
        </div>
    </div>

    <script>
        function updateSportfreund(s) {
            const overlay = document.getElementById('farb-overlay');
            const mund = document.getElementById('anim-mund');
            
            // Farbe setzen (ohne Augen zu berühren)
            overlay.style.backgroundColor = (s < 2000) ? "red" : (s < 8000) ? "green" : "transparent";

            // Mund animieren
            let curve = 200 + (s / 100);
            mund.setAttribute('d', `M 80,200 Q 150,${curve} 220,200`);
        }
    </script>
</body>
</html>
