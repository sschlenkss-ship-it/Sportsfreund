<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #stage { position: relative; width: 400px; }
        
        #original-wolke { 
            width: 100%; 
            display: block; 
            transition: all 0.5s ease; 
        }
        
        #overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .lid { fill: #d1e8ef; stroke: #000; stroke-width: 1; transition: transform 0.3s; }
        .mouth-overlay { stroke: #001f5f; stroke-width: 15; fill: none; stroke-linecap: round; transition: d 0.3s; }
    </style>
</head>
<body>

    <div style="color: white; margin-bottom: 20px;">
        Schritte: <input type="number" id="stepInput" value="0" oninput="applyMood(this.value)">
    </div>

    <div id="stage">
        <img id="original-wolke" src="WOLKEsvg_122854.svg">
        
        <svg id="overlay-layer" viewBox="0 0 540 380">
            <path id="lidL" class="lid" d="M 155,180 A 45,45 0 0,1 245,180 Z" transform="scale(1,0)" />
            <path id="lidR" class="lid" d="M 295,180 A 45,45 0 0,1 385,180 Z" transform="scale(1,0)" />
            <path id="mouth-overlay" class="mouth-overlay" d="M 230,280 Q 270,320 310,280" />
        </svg>
    </div>

    <script>
        function applyMood(s) {
            const wolke = document.getElementById('original-wolke');
            const lidL = document.getElementById('lidL');
            const lidR = document.getElementById('lidR');
            const mouth = document.getElementById('mouth-overlay');
            
            // Wir ändern hier nur den Farbton und die Sättigung
            if (s < 2000) {
                wolke.style.filter = "sepia(100%) hue-rotate(320deg) saturate(500%)"; // Dunkles Rot
                lidL.style.transform = "scale(1, 0.5)"; lidR.style.transform = "scale(1, 0.5)";
                mouth.setAttribute('d', 'M 230,310 Q 270,280 310,310');
            } else if (s < 8000) {
                wolke.style.filter = "none"; // Originalzustand
                lidL.style.transform = "scale(1, 0)"; lidR.style.transform = "scale(1, 0)";
                mouth.setAttribute('d', 'M 230,280 Q 270,320 310,280');
            } else {
                wolke.style.filter = "sepia(100%) hue-rotate(20deg) saturate(300%)"; // Gold-Effekt
                lidL.style.transform = "scale(1, 0)"; lidR.style.transform = "scale(1, 0)";
                mouth.setAttribute('d', 'M 220,270 Q 270,340 320,270');
            }
        }
    </script>
</body>
</html>
