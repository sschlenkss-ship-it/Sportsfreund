<!DOCTYPE html>
<html lang="de">
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <input type="range" id="moodSlider" min="0" max="10000" value="0" oninput="updateSportsfreund(this.value)">
    </div>

    <div style="position: relative; width: 400px; margin: auto;">
        <img src="Wolke5_blanko_023516.png" id="basis" style="width: 100%; filter: drop-shadow(5px 0 0 red) drop-shadow(-5px 0 0 red) drop-shadow(0 5px 0 red) drop-shadow(0 -5px 0 red);">
        <img src="Wolke2_nurAugen_023509.png" class="augen" style="position: absolute; top: 0; left: 0; width: 100%;">
        
        <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
            <path id="mouthPath" d="M 130,220 Q 200,280 270,220" stroke="#000" stroke-width="8" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <style>
        @keyframes blinzeln { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0); } }
        .augen { animation: blinzeln 4s infinite; transform-origin: center; }
    </style>

    <script>
        function updateSportsfreund(s) {
            const basis = document.getElementById('basis');
            const mouth = document.getElementById('mouthPath');
            
            // Kontur-Farbe
            let color = (s < 2000) ? "red" : (s < 8000) ? "green" : "gold";
            basis.style.filter = `drop-shadow(5px 0 0 ${color}) drop-shadow(-5px 0 0 ${color}) drop-shadow(0 5px 0 ${color}) drop-shadow(0 -5px 0 ${color})`;
            
            // Mund-Animation: Wir verändern den Bogen (Q-Punkt)
            // Unter 2000: traurig (nach unten), ab 4000: lächelnd (nach oben)
            let curve = 280 - (s / 50); 
            mouth.setAttribute('d', `M 130,220 Q 200,${curve} 270,220`);
        }
    </script>
</body>
</html>
