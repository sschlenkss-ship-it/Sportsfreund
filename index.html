<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        
        /* Das Panel für die Kontrolle */
        #control-panel { color: white; margin-bottom: 20px; background: #1a1a1a; padding: 15px; border-radius: 10px; }
        
        #stage { position: relative; width: 400px; }
        #original-wolke { width: 100%; display: block; transition: filter 0.5s; }
        #overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .lid { fill: #d1e8ef; transition: transform 0.2s; } 
        .mouth-overlay { stroke: #001f5f; stroke-width: 15; fill: none; stroke-linecap: round; transition: d 0.3s; }
    </style>
</head>
<body>

    <div id="control-panel">
        <label>Schritte: <input type="number" id="stepInput" value="0" oninput="updateMood(this.value)"></label>
        <p style="font-size: 0.8em; opacity: 0.7;">Stufen: 0 (Rot) -> 10.000 (Gold)</p>
    </div>

    <div id="stage">
        <img id="original-wolke" src="WOLKEsvg_122854.svg">
        
        <svg id="overlay-layer" viewBox="0 0 540 380">
            <ellipse id="lidL" class="lid" cx="200" cy="180" rx="45" ry="0" />
            <ellipse id="lidR" class="lid" cx="340" cy="180" rx="45" ry="0" />
            <path id="mouth-overlay" class="mouth-overlay" d="M 230,280 Q 270,320 310,280" />
        </svg>
    </div>

    <script>
        function updateMood(steps) {
            const wolke = document.getElementById('original-wolke');
            const mouth = document.getElementById('mouth-overlay');
            const lids = [document.getElementById('lidL'), document.getElementById('lidR')];
            
            // Stufen-Logik
            if (steps < 2000) {
                // Schlecht: Lavarot
                wolke.style.filter = "hue-rotate(270deg)"; 
                lids.forEach(l => l.setAttribute('ry', '45')); 
                mouth.setAttribute('d', 'M 230,310 Q 270,280 310,310'); 
            } else if (steps < 5000) {
                // Blau
                wolke.style.filter = "hue-rotate(200deg)"; 
                lids.forEach(l => l.setAttribute('ry', '0'));
                mouth.setAttribute('d', 'M 230,290 Q 270,300 310,290'); 
            } else if (steps < 8000) {
                // Grün
                wolke.style.filter = "hue-rotate(100deg)"; 
                lids.forEach(l => l.setAttribute('ry', '0'));
                mouth.setAttribute('d', 'M 230,280 Q 270,320 310,280'); 
            } else {
                // Perfekt: Gold-Glanz (hue-rotate für Gold ist oft 40deg)
                wolke.style.filter = "hue-rotate(40deg) saturate(150%)";
                lids.forEach(l => l.setAttribute('ry', '0'));
                mouth.setAttribute('d', 'M 220,270 Q 270,340 320,270'); 
            }
        }
    </script>
</body>
</html>
