<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { background: #030406; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #sportsfreund-container { width: 500px; }
        
        /* Die Variablen steuern die Stimmung */
        :root { --c-main: #b91c1c; --c-mouth: #001f5f; }
        
        /* Originalelemente aus deiner Datei */
        .cloud-border { stroke: var(--c-main); transition: stroke 0.5s; }
        
        /* Animationen für die neuen Elemente */
        .lid { fill: #d1e8ef; transition: transform 0.3s ease; transform-origin: center; }
        #mouth-path { transition: d 0.5s ease; stroke: var(--c-mouth); }
    </style>
</head>
<body>

    <div id="sportsfreund-container">
        <svg viewBox="0 0 600 400">
            <path id="border" class="cloud-border" d="M472.9 83.1c-13.4-23.7-36.9-42.5-62.8-51.4-25.9-8.9-54.3-8.1-80.1 2.3-15.6-13.9-35.4-22.3-56.9-22.3-25.5 0-48.8 11.2-65.7 28.7-22.1-13.3-48.2-16.7-73.6-9.1-25.4 7.6-47.1 24.5-59.5 47.3-22.5 0-44.5 9.4-60.6 26.6C6.6 120.7 0 144.1 0 168.3c0 24.2 6.6 47.7 19.3 68.3 12.7 20.6 30.6 36.6 52.2 45.4 6.9 14.8 18.2 27.6 32.5 36.6 14.3 9 30.9 13.9 47.9 13.9 23.3 0 45.4-8.8 62.6-24.5 13.7 13.7 32.2 21.6 51.6 21.6 19.4 0 37.9-7.9 51.6-21.6 17.2 15.7 39.3 24.5 62.6 24.5 17 0 33.6-4.9 47.9-13.9 14.3-9 25.6-21.8 32.5-36.6 21.6-8.8 39.5-24.8 52.2-45.4 12.7-20.6 19.3-44.1 19.3-68.3 0-24.2-6.6-47.7-19.3-68.3-12.7-20.6-30.6-36.6-52.2-45.4z" fill="#d1e8ef" stroke-width="12" />
            
            <circle cx="200" cy="180" r="45" fill="white" />
            <circle cx="340" cy="180" r="45" fill="white" />
            <circle cx="210" cy="170" r="22" fill="#007bff" />
            <circle cx="350" cy="170" r="22" fill="#007bff" />
            
            <ellipse id="lidL" class="lid" cx="200" cy="180" rx="45" ry="0" />
            <ellipse id="lidR" class="lid" cx="340" cy="180" rx="45" ry="0" />
            
            <path id="mouth-path" d="M 230,280 Q 270,320 310,280" fill="none" stroke-width="15" stroke-linecap="round" />
        </svg>
    </div>

    <script>
        function updateState(steps) {
            const root = document.documentElement;
            const mouth = document.getElementById('mouth-path');
            const lids = [document.getElementById('lidL'), document.getElementById('lidR')];
            
            if (steps < 2000) {
                root.style.setProperty('--c-main', '#b91c1c'); // Lavarot
                lids.forEach(l => l.setAttribute('ry', '45')); // Augen zu
                mouth.setAttribute('d', 'M 230,310 Q 270,280 310,310'); // Mund traurig
            } else {
                root.style.setProperty('--c-main', '#ca8a04'); // Gold
                lids.forEach(l => l.setAttribute('ry', '0')); // Augen auf
                mouth.setAttribute('d', 'M 230,280 Q 270,320 310,280'); // Mund grinsend
            }
        }
    </script>
</body>
</html>
