<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { margin: 0; background: #030406; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        #sportsfreund-stage { 
            position: relative; width: 300px;
            /* Kräftige Kontur & Schein */
            filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 20px gold); 
        }
        
        /* Die Wolke als Hintergrund (mit Stirnband) */
        #cloud-asset { width: 100%; display: block; }

        /* Gesichtsebene (liegt über der Wolke) */
        .face-layer { position: absolute; top: 20%; left: 10%; width: 80%; height: 60%; pointer-events: none; }

        /* Augen-Design mit Pupille */
        .eye-ball { fill: white; }
        .iris { fill: #55b5ff; }
        .pupil { fill: black; } /* Hier ist die schwarze Pupille */
        .shine { fill: white; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="sportsfreund-stage">
        <img id="cloud-asset" src="wolke_mit_stirnband.png" alt="Sportsfreund">
        
        <svg class="face-layer" viewBox="0 0 200 100">
            <g>
                <circle cx="60" cy="40" r="22" class="eye-ball"/>
                <circle cx="60" cy="40" r="12" class="iris"/>
                <circle cx="62" cy="38" r="5" class="pupil"/>
                <circle cx="64" cy="36" r="3" class="shine"/>
            </g>
            <g>
                <circle cx="140" cy="40" r="22" class="eye-ball"/>
                <circle cx="140" cy="40" r="12" class="iris"/>
                <circle cx="142" cy="38" r="5" class="pupil"/>
                <circle cx="144" cy="36" r="3" class="shine"/>
            </g>
            
            <path d="M 70,75 Q 100,90 130,75" stroke="#1a2233" stroke-width="6" fill="none" stroke-linecap="round"/>
        </svg>
    </div>
</body>
</html>
