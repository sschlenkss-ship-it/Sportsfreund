<!DOCTYPE html>
<html lang="de">
<body>
    <div style="position: relative; width: 300px; margin: 50px;">
        <img src="button_105105.svg" id="smiley-base" style="width: 100%;">

        <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;">
            <rect id="lider" x="80" y="80" width="140" height="60" fill="#D4AF37" />
            
            <path id="anim-mund" d="M 100,200 Q 150,200 200,200" stroke="#800000" stroke-width="8" fill="none" stroke-linecap="round" />
        </svg>
    </div>

    <input type="range" min="0" max="10000" value="0" oninput="updateSportfreund(this.value)">

    <style>
        /* Blinzeln: Lider schieben sich runter und wieder rauf */
        @keyframes blinken { 0%, 90%, 100% { height: 0; } 95% { height: 60px; } }
        #lider { animation: blinken 5s infinite; }
    </style>

    <script>
        function updateSportfreund(s) {
            const mund = document.getElementById('anim-mund');
            // Mund-Kurve animieren
            let curve = 200 + (s / 50); 
            mund.setAttribute('d', `M 100,200 Q 150,${curve} 200,200`);
        }
    </script>
</body>
</html>
