<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --c-main: #b91c1c; --c-pastel: rgba(185, 28, 28, 0.1); }
        body { background: #030406; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #sportsfreund-container { width: 450px; }
        
        .cloud-border { stroke: var(--c-main); fill: #e0f2f7; transition: all 0.5s ease; }
        .eye-iris { fill: var(--c-main); transition: fill 0.5s ease; }
        .mouth-line { stroke: var(--c-main); transition: all 0.5s ease; }
        
        /* Das Augenlid - Animation */
        .lid { fill: #e0f2f7; transition: transform 0.2s ease; transform-origin: center; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(0); } 95% { transform: scaleY(1); } }
        .animate-blink { animation: blink 4s infinite; }
    </style>
</head>
<body>

    <div id="sportsfreund-container">
        <svg viewBox="0 0 540 380">
            <path id="border" class="cloud-border" d="M472.9 83.1c-13.4-23.7-36.9-42.5-62.8-51.4-25.9-8.9-54.3-8.1-80.1 2.3-15.6-13.9-35.4-22.3-56.9-22.3-25.5 0-48.8 11.2-65.7 28.7-22.1-13.3-48.2-16.7-73.6-9.1-25.4 7.6-47.1 24.5-59.5 47.3-22.5 0-44.5 9.4-60.6 26.6C6.6 120.7 0 144.1 0 168.3c0 24.2 6.6 47.7 19.3 68.3 12.7 20.6 30.6 36.6 52.2 45.4 6.9 14.8 18.2 27.6 32.5 36.6 14.3 9 30.9 13.9 47.9 13.9 23.3 0 45.4-8.8 62.6-24.5 13.7 13.7 32.2 21.6 51.6 21.6 19.4 0 37.9-7.9 51.6-21.6 17.2 15.7 39.3 24.5 62.6 24.5 17 0 33.6-4.9 47.9-13.9 14.3-9 25.6-21.8 32.5-36.6 21.6-8.8 39.5-24.8 52.2-45.4 12.7-20.6 19.3-44.1 19.3-68.3 0-24.2-6.6-47.7-19.3-68.3-12.7-20.6-30.6-36.6-52.2-45.4z" stroke-width="12" />
            
            <g id="eyes">
                <circle cx="200" cy="180" r="45" fill="white" />
                <circle cx="340" cy="180" r="45" fill="white" />
                <circle class="eye-iris" cx="210" cy="170" r="22" />
                <circle class="eye-iris" cx="350" cy="170" r="22" />
                <ellipse id="lidL" class="lid animate-blink" cx="200" cy="180" rx="45" ry="45" />
                <ellipse id="lidR" class="lid animate-blink" cx="340" cy="180" rx="45" ry="45" />
            </g>

            <path id="mouth" class="mouth-line" d="M 230,280 Q 270,320 310,280" fill="none" stroke-width="15" stroke-linecap="round" />
        </svg>
    </div>

    <script>
        function updateState(steps) {
            const root = document.documentElement;
            const mouth = document.getElementById('mouth');
            const lids = [document.getElementById('lidL'), document.getElementById('lidR')];
            
            let cfg;
            if (steps < 2000) cfg = { c: '#b91c1c', m: 'M 230,310 Q 270,280 310,310', lid: 0.5 };
            else if (steps < 8000) cfg = { c: '#1d4ed8', m: 'M 230,280 Q 270,320 310,280', lid: 0 };
            else cfg = { c: '#ca8a04', m: 'M 210,260 Q 270,340 330,260', lid: 0 };

            root.style.setProperty('--c-main', cfg.c);
            mouth.setAttribute('d', cfg.m);
            // Lider bei schlechter Stimmung leicht senken
            lids.forEach(l => l.style.opacity = cfg.lid);
        }
    </script>
</body>
</html>
