<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { background-color: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .smiley-container { position: relative; width: 300px; height: 300px; }
        
        #smiley-display { 
            width: 100%; height: auto; 
            filter: url(#pro-outline);
            transition: all 0.5s ease;
        }

        /* Der hochwertige Blinzel-Layer */
        .blinzel-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #FFD700; /* Muss zu deiner Smiley-Farbe passen */
            clip-path: polygon(0 0, 100% 0, 100% 0, 0 0); /* Start: zu */
            pointer-events: none;
            transition: clip-path 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Blinzel-Animation */
        .blinzel-aktiv { animation: blinzeln-zyklus 6s infinite; }
        @keyframes blinzeln-zyklus {
            0%, 90% { clip-path: polygon(0 0, 100% 0, 100% 0, 0 0); }
            95% { clip-path: polygon(0 40%, 100% 40%, 100% 60%, 0 60%); } /* Fokuspunkt */
            100% { clip-path: polygon(0 0, 100% 0, 100% 0, 0 0); }
        }
    </style>
</head>
<body>

<svg width="0" height="0">
  <defs>
    <filter id="pro-outline">
      <feMorphology in="SourceAlpha" result="dilated" operator="dilate" radius="16"/>
      <feFlood id="outline-color" flood-color="#FFD700"/>
      <feComposite in2="dilated" operator="in"/>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
  </defs>
</svg>

<div class="smiley-container">
    <img src="Smiley1.png" id="smiley-display">
    <div id="blinzel-overlay" class="blinzel-layer blinzel-aktiv"></div>
</div>

<input type="range" min="1" max="8" value="1" style="width: 300px; margin-top: 50px;" oninput="updateSportfreund(this.value)">

<script>
    function updateSportfreund(val) {
        const img = document.getElementById('smiley-display');
        const overlay = document.getElementById('blinzel-overlay');
        const colorFilter = document.getElementById('outline-color');
        
        img.src = `Smiley${val}.png`;
        
        // Farbe setzen
        const farben = ["#FFD700", "#EEDD00", "#32CD32", "#0000FF", "#00008B", "#800080", "#8B0000", "#FF4500"];
        colorFilter.setAttribute('flood-color', farben[val - 1]);
        overlay.style.background = farben[val - 1];

        // Nur bei frohen Smileys blinzeln
        overlay.style.display = (val <= 3) ? 'block' : 'none';
    }
</script>
</body>
</html>
