<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #030406; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* Die Bühne ist jetzt das einzige Steuerelement */
        #sportsfreund { width: 350px; }
        
        /* Die Kontur: Wir nutzen einen stroke-filter für eine perfekte Umrandung */
        .cloud-svg { filter: drop-shadow(0 0 0 var(--main-color)); transition: all 0.5s; }
        .outline { stroke: var(--main-color); stroke-width: 15; fill: none; }
    </style>
</head>
<body>

<div id="sportsfreund">
    <input type="number" id="stepInput" value="0" oninput="updateState()" style="width:100%; margin-bottom:10px;">
    
    <svg viewBox="0 0 300 300">
        <path class="outline" d="M 50,150 Q 150,50 250,150 Q 250,250 150,250 Q 50,250 50,150" />
        
        <image href="wolke1.png" x="25" y="75" width="250" height="150" />
        
        <g id="face" transform="translate(150, 150)">
            <circle cx="-50" cy="-20" r="20" fill="white" /> <circle cx="50" cy="-20" r="20" fill="white" />  <path id="mouth" d="M -40,20 Q 0,40 40,20" stroke="black" stroke-width="8" fill="none" />
        </g>
    </svg>
</div>

<script>
    function updateState() {
        const s = document.getElementById('stepInput').value;
        const root = document.documentElement;
        const mouth = document.getElementById('mouth');
        
        // Logik für Farbe und Mund
        if (s < 5000) {
            root.style.setProperty('--main-color', '#ff4500');
            mouth.setAttribute('d', 'M -40,30 Q 0,10 40,30'); // Traurig
        } else {
            root.style.setProperty('--main-color', '#ffd700');
            mouth.setAttribute('d', 'M -40,20 Q 0,50 40,20'); // Grinsen
        }
    }
</script>
</body>
</html>
