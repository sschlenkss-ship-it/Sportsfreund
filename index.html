<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sportsfreund Live</title>
    <style>
        body { margin: 0; background: #030406; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #sportsfreund-stage { width: 300px; height: 250px; position: relative; }
        
        /* Die freigestellte Wolke mit dynamischem Glow */
        #cloud-asset { 
            width: 100%; height: 100%; object-fit: contain; 
            transition: filter 0.6s ease;
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.5)); /* Gold-Startwert */
        }
        
        /* Das Gesicht */
        #face-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .eye-container { animation: blink 4s infinite; transform-origin: center; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
    </style>
</head>
<body>

    <div id="sportsfreund-stage">
        <img id="cloud-asset" src="wolke1.png" alt="Wolke">
        <svg id="face-layer" viewBox="0 0 220 180">
            <g class="eye-container" transform="translate(70, 80)"><circle r="12" fill="white"/><circle cx="3" cy="-2" r="5" fill="#1a2233"/></g>
            <g class="eye-container" transform="translate(150, 80)"><circle r="12" fill="white"/><circle cx="3" cy="-2" r="5" fill="#1a2233"/></g>
            <path d="M 90,120 Q 110,135 130,120" stroke="#1a2233" stroke-width="6" fill="none" stroke-linecap="round"/>
        </svg>
    </div>

    <script>
        // Funktion zum Ändern des Zustands
        function setStatus(mode) {
            const cloud = document.getElementById('cloud-asset');
            if (mode === 'lava') cloud.style.filter = "hue-rotate(320deg) saturate(1.5) drop-shadow(0 0 15px rgba(231,76,60,0.5))";
            else if (mode === 'green') cloud.style.filter = "hue-rotate(70deg) saturate(1.1) drop-shadow(0 0 15px rgba(46,204,113,0.5))";
            else cloud.style.filter = "drop-shadow(0 0 15px rgba(255,215,0,0.5))"; // Gold
        }
        // Test: nach 2 Sekunden auf Lava wechseln
        setTimeout(() => setStatus('lava'), 2000);
    </script>
</body>
</html>
