<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            background: #030406; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        #sportsfreund-stage { 
            position: relative; 
            width: 300px; 
            /* Harte Kontur und Leuchten */
            filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 20px gold); 
        }
        
        /* Das Bild soll immer die volle Breite des Containers einnehmen */
        #cloud-asset { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* Die Gesichtsebene liegt exakt über dem Bild */
        .face-layer { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
        }

        .eye-group { filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
        .eye-ball { fill: white; }
        .iris { fill: #55b5ff; }
        .pupil { fill: black; }
        .shine { fill: white; opacity: 0.6; }
        
        .mouth-path { 
            stroke: #1a2233; stroke-width: 4; 
            fill: none; stroke-linecap: round; 
        }
    </style>
</head>
<body>

    <div id="sportsfreund-stage">
        <img id="cloud-asset" src="wolke1.png" alt="Sportsfreund">
        
        <svg class="face-layer" viewBox="0 0 200 100">
            <g class="eye-group">
                <circle cx="60" cy="45" r="18" class="eye-ball"/>
                <circle cx="60" cy="45" r="10" class="iris"/>
                <circle cx="62" cy="43" r="4" class="pupil"/>
                <circle cx="63" cy="41" r="2" class="shine"/>
            </g>
            <g class="eye-group">
                <circle cx="140" cy="45" r="18" class="eye-ball"/>
                <circle cx="140" cy="45" r="10" class="iris"/>
                <circle cx="142" cy="43" r="4" class="pupil"/>
                <circle cx="143" cy="41" r="2" class="shine"/>
            </g>
            
            <path class="mouth-path" d="M 75,70 Q 100,85 125,70"/>
        </svg>
    </div>

</body>
</html>
