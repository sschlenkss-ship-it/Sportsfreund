<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportfreund Master</title>
    <style>
        :root { --gold: #FFD700; --bg: #030303; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; }
        
        .view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; flex-direction: column; }
        
        /* Smiley Hauptansicht mit korrektem Schatten */
        #smiley-display { width: 250px; cursor: pointer; filter: url(#main-glow); transition: all 0.5s; }
        
        /* Ranking View */
        #view-ranking { background: #0a0a0a; justify-content: flex-start; padding-top: 80px; overflow-y: auto; }
        .header-row { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; background: rgba(10,10,10,0.95); z-index: 10; }
        
        table { width: 95%; border-collapse: separate; border-spacing: 0 10px; margin-bottom: 50px; }
        th { color: #888; font-size: 0.7rem; text-transform: uppercase; padding: 10px; }
        td { background: #161616; padding: 12px; text-align: center; border-radius: 8px; }
        
        /* Buttons - explizit definiert zur Vermeidung von ZerschieÔen */
        button { background: var(--gold); color: #000; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1rem; font-family: inherit; }
        
        /* Settings Overlay */
        #view-settings { background: rgba(0,0,0,0.95); z-index: 100; }
        .box { width: 85%; max-width: 400px; background: #161616; padding: 30px; border-radius: 20px; text-align: center; }
        footer { margin-top: 30px; font-size: 0.75rem; color: #666; }
    </style>
</head>
<body>

<svg width="0" height="0">
    <defs>
        <filter id="main-glow">
            <feMorphology in="SourceAlpha" operator="dilate" radius="10" result="dilated"/>
            <feFlood flood-color="#FFD700"/>
            <feComposite in2="dilated" operator="in"/>
            <feGaussianBlur stdDeviation="15"/>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
</svg>

<!-- 1. Smiley View -->
<div id="view-smiley" class="view" style="display: flex;">
    <img src="Smiley4.png" id="smiley-display" ondblclick="showView('view-ranking')">
</div>

<!-- 2. Ranking View -->
<div id="view-ranking" class="view">
    <div class="header-row">
        <button onclick="showView('view-smiley')">Zur■ck</button>
        <span style="font-size: 28px; cursor: pointer; color: white;" onclick="showView('view-settings')">&#9881;</span>
    </div>
    <h1>Freunde-Ranking</h1>
    <table id="friends-table">
        <tr><th>Status</th><th>Name</th><th>Schritte</th><th>kcal</th><th>Min.</th><th>Punkte</th></tr>
    </table>
</div>

<!-- 3. Settings View -->
<div id="view-settings" class="view">
    <div class="box">
        <h1>Einstellungen</h1>
        <div style="margin: 20px 0;">
            <p>Schlafenszeit:</p>
            <input type="time" id="s-start" value="23:00"> bis <input type="time" id="s-end" value="07:00">
        </div>
        <button onclick="showView('view-ranking')">Zur■ck</button>
        <footer>Impressum | Datenschutz</footer>
    </div>
</div>

<script>
    const statusColors = ["#FF0000", "#FF4500", "#FF8C00", "#EEDD00", "#32CD32", "#00FF00", "#00DFFF", "#FFD700"];
    
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function renderTable() {
        const t = document.getElementById('friends-table');
        const friends = [
            { name: "Max", steps: 15200, kcal: 850, sportMin: 60 },
            { name: "Anna", steps: 5000, kcal: 600, sportMin: 120 },
            { name: "Tim", steps: 3000, kcal: 200, sportMin: 0 }
        ];
        
        friends.forEach(f => {
            let pts = Math.floor((f.steps + (f.kcal*2) + (f.sportMin*50)) / 20);
            let lvl = Math.min(8, Math.max(1, Math.floor(pts / 100) + 1));
            t.innerHTML += `
                <tr>
                    <td><img src="Smiley${9-lvl}.png" class="sm-icon" style="filter: drop-shadow(0 0 5px ${statusColors[lvl-1]})"></td>
                    <td>${f.name}</td>
                    <td>${f.steps.toLocaleString()}</td>
                    <td>${f.kcal}</td>
                    <td>${f.sportMin}</td>
                    <td style="color:${statusColors[lvl-1]}; font-weight:bold">${pts}</td>
                </tr>`;
        });
    }

    function checkSleepMode() {
        const hrs = new Date().getHours();
        const start = parseInt(document.getElementById('s-start').value.split(':')[0]);
        const end = parseInt(document.getElementById('s-end').value.split(':')[0]);
        const isSleeping = (hrs >= start || hrs < end);
        document.getElementById('smiley-display').src = isSleeping ? 'Smiley0.png' : 'Smiley4.png';
    }

    renderTable();
    setInterval(checkSleepMode, 60000);
    checkSleepMode();
</script>
</body>
</html>
