<script>
    function applyMood(s) {
        const moodLayer = document.getElementById('mood-layer');
        const lidL = document.getElementById('lidL');
        const lidR = document.getElementById('lidR');
        const mouth = document.getElementById('mouth-overlay');
        
        // Mood-Logik
        let settings;
        if (s < 1000) { settings = { col: 'rgba(139,0,0,0.4)', lid: 0.5, m: 'M 230,310 Q 270,280 310,310' }; } // Traurig, halb zu
        else if (s < 2000) { settings = { col: 'rgba(139,0,0,0.3)', lid: 0.8, m: 'M 230,310 Q 270,290 310,310' }; } // Schlafend, zu
        else if (s < 8000) { settings = { col: 'rgba(34,197,94,0.3)', lid: 0, m: 'M 230,280 Q 270,320 310,280' }; } // Freude
        else { settings = { col: 'rgba(255,215,0,0.3)', lid: 0, m: 'M 220,270 Q 270,340 320,270' }; } // Gold-Glanz

        moodLayer.style.background = settings.col;
        lidL.style.transform = `scale(1, ${settings.lid})`;
        lidR.style.transform = `scale(1, ${settings.lid})`;
        mouth.setAttribute('d', settings.m);
    }
</script>

<style>
    /* Blinzel-Animation, die sich je nach Stimmung anpasst */
    @keyframes blink { 0%, 90% { transform: scaleY(0); } 95% { transform: scaleY(1); } }
    
    /* Der "Freuden-Blinzel-Effekt" */
    .happy-blink { animation: blink 3s infinite; }
</style>
