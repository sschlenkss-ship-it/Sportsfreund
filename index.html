<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --main-color: #ff4500; }
        body { margin: 0; background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white; }

        #sportsfreund-stage { position: relative; width: 320px; }
        
        /* Echte Vektorkontur statt Schein */
        .outline { stroke: var(--main-color); stroke-width: 12; fill: none; transition: stroke 0.5s ease; }
        
        /* Augen & Hochwertige Details */
        .eye-ball { fill: #fff; }
        .iris { fill: radial-gradient(circle, #fff 15%, var(--iris-color) 70%); transition: all 0.5s; }
        .mouth-container { transition: all 0.5s ease; }
        
        /* Hochwertige Zähne */
        .tooth { fill: #fff; rx: 2; transition: opacity 0.3s; }
        
        /* Realistisches Blinzeln: Lider bewegen sich von oben nach unten */
        .lid { fill: #030406; transition: height 0.2s ease-in-out; }
    </style>
</head>
<body>

    <div style="margin-bottom:20px;">
        Schritte: <input type="number" id="stepInput" value="0" oninput="updateState()">
    </div>

    <div id="sportsfreund-stage">
        <svg viewBox="0 0 300 300" style="position:absolute; width:100%; height:100%; pointer-events:none; z-index:10;">
            <path d="M 50,150 Q 150,50 250,150 Q 250,250 150,250 Q 50,250 50,150" class="outline"/>
        </svg>

        <img id="cloud-asset" src="wolke1.png" style="width:100%; display:block;">
        
        <svg viewBox="0 0 200 100" style="position:absolute; top:0; left:0; width:100%; height:100%;">
            <g id="eyeL">
                <circle cx="65" cy="45" r="24" class="eye-ball"/>
                <circle cx="65" cy="45" r="14" class="iris" style="--iris-color: #55b5ff;"/>
                <circle cx="68" cy="42" r="6" class="pupil" fill="#000"/>
                <rect id="lidL" x="41" y="21" width="48" height="0" class="lid"/>
            </g>
            
            <g id="mouth-container">
                <path id="mouth" d="M 70,85 Q 100,70 130,85" stroke="#1a2233" stroke-width="6" fill="none" stroke-linecap="round"/>
                <g id="teeth-group" opacity="0">
                    <rect class="tooth" x="80" y="78" width="10" height="8"/>
                    <rect class="tooth" x="92" y="78" width="10" height="8"/>
                    <rect class="tooth" x="104" y="78" width="10" height="8"/>
                </g>
            </g>
        </svg>
    </div>

    <script>
        function updateState() {
            const steps = parseInt(document.getElementById('stepInput').value);
            const root = document.documentElement;
            const mouth = document.getElementById('mouth');
            const lids = [document.getElementById('lidL'), document.getElementById('lidR')];
            const teeth = document.getElementById('teeth-group');
            
            // Logik-Mapping
            let c;
            if (steps < 2000) c = { col: '#ff4500', m: 'M 70,85 Q 100,70 130,85', lidH: 24, teeth: 0 };
            else if (steps < 5000) c = { col: '#3b82f6', m: 'M 70,80 Q 100,85 130,80', lidH: 12, teeth: 0 };
            else if (steps < 8000) c = { col: '#32cd32', m: 'M 70,80 Q 100,95 130,80', lidH: 0, teeth: 0 };
            else if (steps < 10000) c = { col: '#ffa500', m: 'M 70,75 Q 100,105 130,75', lidH: 0, teeth: 1 };
            else c = { col: '#ffd700', m: 'M 60,70 Q 100,115 140,70', lidH: 0, teeth: 1 };

            root.style.setProperty('--main-color', c.col);
            mouth.setAttribute('d', c.m);
            teeth.style.opacity = c.teeth;
            document.getElementById('lidL').setAttribute('height', c.lidH);
        }
    </script>
</body>
</html>
