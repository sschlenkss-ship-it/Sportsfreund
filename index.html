<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportfreund App</title>
    <style>
        body { 
            background-color: #050505; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif; 
        }
        
        #smiley-wrapper { 
            position: relative; 
            width: 300px; 
            height: 300px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #smiley-display { 
            width: 100%; 
            height: auto; 
            transition: filter 0.6s ease-in-out, transform 0.3s ease;
            filter: drop-shadow(0 0 25px #FFD700);
        }

        .star {
            position: absolute; 
            width: 25px; 
            height: 25px; 
            background: gold;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle 1.5s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes twinkle { 
            0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); } 
            50% { opacity: 1; transform: scale(1.2) rotate(180deg); } 
        }
    </style>
</head>
<body>

<div id="smiley-wrapper">
    <img src="Smiley1.png" id="smiley-display" alt="Sportfreund Smiley">
    <div id="star-container"></div>
</div>

<script>
    /**
     * Hauptfunktion zur Steuerung der Emotion & Belohnung
     * @param {number} schritte - Aktuelle Schrittzahl
     */
    function updateApp(schritte) {
        const img = document.getElementById('smiley-display');
        const container = document.getElementById('star-container');
        
        // 1. Emotion: Stufe 8 (Lava-Rot) bei 0, Stufe 1 (Gold) bei > 15.000
        let stufe = Math.max(1, Math.min(8, 8 - Math.floor(schritte / 2000)));
        img.src = `Smiley${stufe}.png`;
        
        // 2. Kontur-Farben (Vollton-Logik)
        const farben = ["#FFD700", "#FFD700", "#EEDD00", "#32CD32", "#0000FF", "#00008B", "#800080", "#FF4500"];
        img.style.filter = `drop-shadow(0 0 30px ${farben[stufe - 1]})`;

        // 3. Sterne-Belohnung (ab 10.000 Schritten)
        container.innerHTML = '';
        if (schritte >= 10000) {
            let anzahlSterne = Math.min(12, Math.floor((schritte - 8000) / 2000));
            for(let i = 0; i < anzahlSterne; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                let angle = (i / anzahlSterne) * Math.PI * 2;
                star.style.left = 150 + 140 * Math.cos(angle) + 'px';
                star.style.top = 150 + 140 * Math.sin(angle) + 'px';
                star.style.animationDelay = (i * 0.2) + 's';
                container.appendChild(star);
            }
        }
    }

    // --- Simulation für Vercel/GitHub Test ---
    // Hier wird später der Aufruf deiner Fitness-API stehen
    let simSchritte = 0;
    setInterval(() => {
        simSchritte = (simSchritte + 500) % 22000;
        updateApp(simSchritte);
    }, 800);
</script>
</body>
</html>
