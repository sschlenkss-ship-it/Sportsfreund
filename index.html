<!DOCTYPE html>
<html lang="de">
<body>
    <div id="wolke-container" style="width: 400px;">
        <object id="wolke-obj" data="WOLKEsvg_011832.svg" type="image/svg+xml" width="100%"></object>
        <svg id="overlay" viewBox="0 0 600 400" style="position: absolute; top: 0; left: 0; width: 400px; pointer-events: none;">
            <path id="mouth" d="M 230,280 Q 300,320 370,280" stroke="#001f5f" stroke-width="8" fill="none" />
        </svg>
    </div>

    <script>
        const obj = document.getElementById('wolke-obj');
        obj.addEventListener('load', () => {
            const svgDoc = obj.contentDocument;
            const contour = svgDoc.querySelector('path'); // Wählt den Außenpfad
            const mouth = document.getElementById('mouth');

            // Funktion für deine App
            window.updateSportsfreund = (s) => {
                // Kontur-Farbe exakt setzen
                if (s < 2000) contour.style.stroke = "#8B0000"; // Dunkelrot
                else if (s < 8000) contour.style.stroke = "#22c55e"; // Grün
                else contour.style.stroke = "#FFD700"; // Gold
                
                // Mund wächst
                let curve = 280 + (s / 50);
                mouth.setAttribute('d', `M 230,280 Q 300,${curve} 370,280`);
            };
        });
    </script>
</body>
</html>
