<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #030406; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #stage { position: relative; width: 400px; }
        #original-wolke { width: 100%; display: block; filter: hue-rotate(0deg); transition: filter 0.5s; }
        #overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Die Lider - Farbe anpassen, damit sie unsichtbar sind, wenn offen */
        .lid { fill: #d1e8ef; transition: transform 0.2s; } 
        .mouth-overlay { stroke: #001f5f; stroke-width: 10; fill: none; transition: d 0.5s; }
    </style>
</head>
<body>

    <div id="stage">
        <img id="original-wolke" src="WOLKEsvg_122854.svg">
        
        <svg id="overlay-layer" viewBox="0 0 540 380">
            <ellipse id="lidL" class="lid" cx="195" cy="180" rx="45" ry="0" />
            <ellipse id="lidR" class="lid" cx="345" cy="180" rx="45" ry="0" />
            <path id="mouth-overlay" class="mouth-overlay" d="M 230,280 Q 270,320 310,280" />
        </svg>
    </div>

    <script>
        // Test-Funktion: setMood(1000) für traurig, setMood(9000) für glücklich
        function setMood(steps) {
            const wolke = document.getElementById('original-wolke');
            const mouth = document.getElementById('mouth-overlay');
            const lids = [document.getElementById('lidL'), document.getElementById('lidR')];
            
            if (steps < 2000) {
                wolke.style.filter = "hue-rotate(270deg)"; // Lavarot
                lids.forEach(l => l.setAttribute('ry', '45')); // Lider zu
                mouth.setAttribute('d', 'M 230,310 Q 270,280 310,310'); // Mund traurig
            } else {
                wolke.style.filter = "hue-rotate(0deg)"; // Originalfarben
                lids.forEach(l => l.setAttribute('ry', '0')); // Lider offen
                mouth.setAttribute('d', 'M 230,280 Q 270,320 310,280'); // Mund grinsend
            }
        }
    </script>
</body>
</html>
