<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportfreund Master</title>
    <style>
        :root { --gold: #FFD700; --bg: #030303; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        .view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; flex-direction: column; }
        
        #smiley-display { width: 200px; height: 200px; cursor: pointer; filter: url(#main-glow); transition: 0.3s; }
        
        #view-ranking { background: #0a0a0a; justify-content: flex-start; padding-top: 70px; overflow-y: auto; }
        .header-row { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #333; z-index: 10; }
        
        table { width: 95%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .sm-icon { width: 32px; height: 32px; vertical-align: middle; border-radius: 50%; }
        
        button { background: var(--gold); color: #000; border: none; padding: 8px 16px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        #view-settings { background: rgba(0,0,0,0.95); z-index: 100; }
        .box { width: 80%; max-width: 350px; background: #161616; padding: 25px; border-radius: 15px; text-align: center; }
        .settings-btn-group { margin: 20px 0; }
        
        footer { margin-top: 20px; font-size: 0.7rem; color: #666; }
    </style>
</head>
<body>

<svg width="0" height="0"><defs><filter id="main-glow"><feMorphology in="SourceAlpha" operator="dilate" radius="8" result="dilated"/><feFlood flood-color="#FFD700"/><feComposite in2="dilated" operator="in"/><feGaussianBlur stdDeviation="10"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs></svg>

<div id="view-smiley" class="view" style="display: flex;">
    <img src="Smiley4.png" id="smiley-display" ondblclick="showView('view-ranking')">
</div>

<div id="view-ranking" class="view">
    <div class="header-row">
        <button onclick="showView('view-smiley')">Zur³ck</button>
        <span style="font-size: 24px; cursor: pointer;" onclick="showView('view-settings')">&#9881;</span>
    </div>
    <table id="friends-table">
        <tr><th>Status</th><th>Name</th><th>Schritte</th><th>Punkte</th></tr>
    </table>
</div>

<div id="view-settings" class="view">
    <div class="box">
        <h3>Einstellungen</h3>
        <div class="settings-btn-group">
            <p>Schlafenszeit:</p>
            <input type="time" id="s-start" value="23:00"> bis <input type="time" id="s-end" value="07:00">
        </div>
        <button onclick="showView('view-ranking')">Zur³ck</button>
        <footer>Impressum | Datenschutz</footer>
    </div>
</div>

<script>
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function renderTable() {
        const t = document.getElementById('friends-table');
        const friends = [
            { name: "Max", steps: "15.2k", pts: 850 },
            { name: "Anna", steps: "5.0k", pts: 600 }
        ];
        friends.forEach(f => {
            t.innerHTML += `<tr><td><img src="Smiley8.png" class="sm-icon"></td><td>${f.name}</td><td>${f.steps}</td><td>${f.pts}</td></tr>`;
        });
    }
    renderTable();
</script>
</body>
</html>
