<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportfreund Master</title>
    <style>
        :root { --gold: #FFD700; --bg: #030303; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        .view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; flex-direction: column; }
        
        /* Smiley Darstellung */
        #smiley-display { width: 250px; cursor: pointer; transition: all 0.5s; }
        
        /* Ranking View - Scrollbar für viele Freunde */
        #view-ranking { background: #0a0a0a; justify-content: flex-start; padding-top: 80px; overflow-y: auto; }
        
        .header-row { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; background: rgba(10,10,10,0.95); z-index: 10; }
        
        table { width: 95%; border-collapse: separate; border-spacing: 0 10px; margin-bottom: 50px; }
        td { background: #161616; padding: 12px; text-align: center; border-radius: 10px; }
        .sm-icon { width: 45px; height: 45px; border-radius: 50%; }
        
        button { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        /* Einstellungen */
        #view-settings { background: rgba(0,0,0,0.95); z-index: 100; }
        .box { width: 85%; max-width: 400px; background: #161616; padding: 25px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

<!-- 1. Smiley View -->
<div id="view-smiley" class="view" style="display: flex;">
    <img src="Smiley4.png" id="smiley-display" ondblclick="showView('view-ranking')">
</div>

<!-- 2. Ranking View -->
<div id="view-ranking" class="view">
    <div class="header-row">
        <button onclick="showView('view-smiley')">Zurück</button>
        <span style="font-size: 24px; cursor: pointer;" onclick="showView('view-settings')">&#9881;</span>
    </div>
    <h1>Freunde-Ranking</h1>
    <table id="friends-table">
        <tr><th>Status</th><th>Name</th><th>Punkte</th></tr>
    </table>
</div>

<!-- 3. Settings View -->
<div id="view-settings" class="view">
    <div class="box">
        <h1>Einstellungen</h1>
        <div style="margin: 20px 0;">
            <p>Schlafenszeit:</p>
            <input type="time" id="s-start" value="23:00"> bis <input type="time" id="s-end" value="07:00">
        </div>
        <button onclick="showView('view-ranking')">Zurück</button>
        <footer style="margin-top:20px; font-size:0.8rem; color:#666;">Impressum | Datenschutz</footer>
    </div>
</div>

<script>
    const friends = [
        { name: "Max", steps: 15200, kcal: 850, sportMin: 60, lvl: 8 },
        { name: "Anna", steps: 5000, kcal: 600, sportMin: 120, lvl: 5 }
    ];

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function checkSleepMode() {
        const now = new Date();
        const hrs = now.getHours();
        const start = parseInt(document.getElementById('s-start').value.split(':')[0]);
        const end = parseInt(document.getElementById('s-end').value.split(':')[0]);
        
        const isSleeping = (hrs >= start || hrs < end);
        // Nutze Smiley0 für Schlafmodus, sonst Smiley4
        document.getElementById('smiley-display').src = isSleeping ? 'Smiley0.png' : 'Smiley4.png';
    }

    function renderTable() {
        const t = document.getElementById('friends-table');
        friends.forEach(f => {
            let pts = Math.floor((f.steps + (f.kcal*2) + (f.sportMin*50)) / 20);
            t.innerHTML += `<tr><td><img src="Smiley${9-f.lvl}.png" class="sm-icon"></td><td>${f.name}</td><td>${pts}</td></tr>`;
        });
    }

    renderTable();
    setInterval(checkSleepMode, 60000);
    checkSleepMode();
</script>
</body>
</html>
