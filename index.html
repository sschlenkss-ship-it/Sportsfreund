<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sportfreund Master</title>
    <style>
        :root { --gold: #FFD700; --bg: #030303; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .view { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; flex-direction: column; }
        #smiley-display { width: 200px; height: 200px; cursor: pointer; transition: 0.3s; }
        #view-ranking { background: #0a0a0a; justify-content: flex-start; padding-top: 70px; overflow-y: auto; }
        .header-row { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #333; z-index: 10; }
        table { width: 95%; border-collapse: separate; border-spacing: 0 10px; margin-top: 10px; }
        td { background: #161616; padding: 10px; text-align: center; border-bottom: 2px solid #222; }
        .sm-icon { width: 40px; height: 40px; border-radius: 50%; display: block; margin: 0 auto; }
        button { background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<!-- VIEW 1: DASHBOARD -->
<div id="view-smiley" class="view" style="display: flex;">
    <img src="Smiley4.png" id="smiley-display" ondblclick="showView('view-ranking')">
</div>

<!-- VIEW 2: RANKING -->
<div id="view-ranking" class="view">
    <div class="header-row">
        <button onclick="showView('view-smiley')">Zurück</button>
        <span style="font-size: 28px; cursor: pointer;" onclick="showView('view-settings')">&#9881;</span>
    </div>
    <h1>Freunde-Ranking</h1>
    <table id="friends-table">
        <thead><tr><th>Status</th><th>Name</th><th>Schritte</th></tr></thead>
        <tbody id="friends-tbody"></tbody>
    </table>
</div>

<!-- VIEW 3: SETTINGS (Auszug) -->
<div id="view-settings" class="view">
    <div style="width: 90%; background: #161616; padding: 20px; border-radius: 16px;">
        <button onclick="window.Android.triggerPermissionRequest()">Google Health Connect aktivieren</button>
        <button onclick="showView('view-smiley')">Zurück</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = { /* Deine Config wie gehabt */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.showView = (id) => {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    };

    // Die wichtige Brücken-Logik
    window.silentCheckGoogleConnection = () => {
        if (window.Android) {
            try {
                const steps = window.Android.getSteps();
                console.log("Daten erhalten:", steps);
                // Hier Daten in myLocalFitnessData speichern und Tabelle rendern
                renderRankingTable(); 
            } catch (e) { console.error("Bridge Fehler:", e); }
        }
    };

    function renderRankingTable() {
        const tbody = document.getElementById('friends-tbody');
        tbody.innerHTML = `<tr><td><img src="Smiley4.png" class="sm-icon"></td><td>Du</td><td>14320</td></tr>`;
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log("Eingeloggt als", user.uid);
            // Automatischer Datenabgleich nach Start
            setTimeout(window.silentCheckGoogleConnection, 1500);
        }
    });

    signInAnonymously(auth);
</script>
</body>
</html>
