<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { background-color: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .smiley-container { 
            width: 300px; height: 300px; 
            display: flex; align-items: center; justify-content: center;
        }
        
        #smiley-display { 
            width: 100%; height: auto;
            /* Der Rahmen liegt jetzt direkt am PNG-Rand durch 'drop-shadow' */
            filter: drop-shadow(0 0 15px #FFD700); 
            transition: all 0.4s ease;
        }
    </style>
</head>
<body>

<div class="smiley-container">
    <img src="smiley8.png" id="smiley-display">
</div>

<input type="range" min="1" max="8" value="8" style="width: 300px; margin-top: 50px;" oninput="updateSportfreund(this.value)">

<script>
    function updateSportfreund(val) {
        const img = document.getElementById('smiley-display');
        
        // Dateiname anpassen (bitte stelle sicher, dass sie so heißen)
        img.src = `smiley${val}.png`;
        
        // Kontur anpassen: Lava-Rot bei 8, sonst Gold
        const farbe = (val == 8) ? "#FF4500" : "#FFD700";
        img.style.filter = `drop-shadow(0 0 15px ${farbe})`;
    }
</script>
</body>
</html>
