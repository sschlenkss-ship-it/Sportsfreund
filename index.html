<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #sportsfreund-master { width: 400px; height: 400px; }
        
        /* Die Kontur-Klasse */
        .cloud-shape { fill: #f8fafc; stroke-width: 6; stroke-linejoin: round; transition: stroke 0.5s ease; }
        
        /* Mimik-Elemente */
        .eye { fill: #fff; }
        .iris { fill: #3b82f6; transition: fill 0.5s ease; }
        .mouth { fill: none; stroke: #334155; stroke-width: 8; stroke-linecap: round; transition: all 0.5s ease; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;">
        <input type="range" id="stepSlider" min="0" max="10000" value="0" oninput="update()" style="width:300px;">
        <span id="label" style="color:white; margin-left:10px;">0</span>
    </div>

    <svg id="sportsfreund-master" viewBox="0 0 400 300">
        <path id="cloud-path" class="cloud-shape" 
              d="M 120,200 Q 80,200 80,160 Q 80,120 120,120 Q 140,80 180,80 Q 220,80 240,120 Q 280,120 280,160 Q 280,200 240,200 Z" 
              stroke="#ff4500" />

        <g id="face">
            <circle class="eye" cx="140" cy="140" r="28"/>
            <circle class="eye" cx="220" cy="140" r="28"/>
            <circle id="irisL" class="iris" cx="140" cy="140" r="14"/>
            <circle id="irisR" class="iris" cx="220" cy="140" r="14"/>
            <path id="mouth" class="mouth" d="M 160,180 Q 180,170 200,180" />
        </g>
    </svg>

<script>
    function update() {
        const s = document.getElementById('stepSlider').value;
        document.getElementById('label').innerText = s;
        
        const path = document.getElementById('cloud-path');
        const mouth = document.getElementById('mouth');
        const irises = document.querySelectorAll('.iris');
        
        let color = '#ff4500'; // Default Rot
        if (s >= 2000) color = '#3b82f6';
        if (s >= 5000) color = '#22c55e';
        if (s >= 7000) color = '#f97316';
        if (s >= 10000) color = '#eab308';

        path.setAttribute('stroke', color);
        irises.forEach(i => i.style.fill = color);

        // Mimik-Anpassung
        if (s < 2000) mouth.setAttribute('d', 'M 160,190 Q 180,180 200,190'); // traurig
        else if (s < 8000) mouth.setAttribute('d', 'M 160,180 Q 180,190 200,180'); // leicht lächelnd
        else mouth.setAttribute('d', 'M 150,170 Q 180,210 210,170'); // breites grinsen
    }
</script>
</body>
</html>
