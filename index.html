<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sportfreund Master</title>
    <style>
        :root {
            --neon-gold: #FFD700;
            --dark-bg: #030303;
            --card-bg: #111111;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            transition: background 0.3s;
        }

        /* Schwebemodus / Widget-Ansicht */
        body.widget-mode {
            background: transparent !important;
            padding: 0;
        }

        body.widget-mode .app-container {
            display: none;
        }

        body.widget-mode #mainSmiley {
            position: fixed;
            top: 50px;
            left: 50px;
            z-index: 999999;
            cursor: move;
            touch-action: none;
            filter: drop-shadow(0 0 15px var(--neon-gold));
        }

        /* Normale App-Ansicht */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--neon-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .smiley-display {
            text-align: center;
            margin: 30px 0;
        }

        .smiley-img {
            width: 150px;
            height: 150px;
            transition: transform 0.2s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stat-card h3 {
            margin: 0 0 5px 0;
            color: #888;
            font-size: 14px;
        }

        .stat-card p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: var(--neon-gold);
        }

        .btn {
            background: var(--neon-gold);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary {
            background: #222;
            color: #fff;
            border: 1px solid #333;
        }

        .friends-list {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
        }

        .friend-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        .friend-row:last-child {
            border-bottom: none;
        }

        .friend-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .friend-avatar {
            width: 35px;
            height: 35px;
        }
    </style>
</head>
<body>

    <div class="smiley-display">
        <img id="mainSmiley" src="Smiley4.png" alt="Status" class="smiley-img">
    </div>

    <div class="app-container">
        <h1>Sportfreund Master</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Schritte</h3>
                <p id="stepCount">0</p>
            </div>
            <div class="stat-card">
                <h3>Kalorien</h3>
                <p id="calorieCount">0 kcal</p>
            </div>
        </div>

        <button class="btn" onclick="syncHealthData()">Verbinden & Synchronisieren</button>
        <button class="btn btn-secondary" onclick="toggleWidgetMode()">Schwebemodus (Widget) AN/AUS</button>

        <div class="friends-list">
            <h3>Freunde-Rangliste (Live)</h3>
            <div id="friendsContainer">
                </div>
            <button class="btn btn-secondary" style="margin-top: 10px;" onclick="addFriend()">+ Freund einladen</button>
        </div>
    </div>

    <script>
        // Daten-Zustand der App
        let userData = {
            steps: 0,
            calories: 0,
            target: 10000
        };

        // Liste der Freunde (wird im echten Betrieb später aus der Cloud geladen)
        let friends = [
            { id: "1", name: "Max (Beispiel)", steps: 4500, status: 4 },
            { id: "2", name: "Anna (Beispiel)", steps: 8900, status: 7 }
        ];

        // 1. KORREKTUR: Echte Synchronisation (Überschreiben, nicht Addieren!)
        function syncHealthData() {
            if (window.Android && window.Android.getSteps) {
                // Holt die echten Daten von der Android-Hülle
                userData.steps = parseInt(window.Android.getSteps());
                userData.calories = parseInt(window.Android.getCalories());
            } else {
                // Demo-Modus für den Browser (erhöht simuliert Werte nur beim Testen)
                userData.steps += Math.floor(Math.random() * 500) + 100;
                userData.calories = Math.floor(userData.steps * 0.04);
            }
            
            updateUI();
        }

        // Automatische Synchronisation alle 5 Minuten im Hintergrund simulieren
        setInterval(syncHealthData, 300000);

        // UI und Smiley-Aussehen basierend auf Schritten aktualisieren
        function updateUI() {
            document.getElementById('stepCount').innerText = userData.steps;
            document.getElementById('calorieCount').innerText = userData.calories + " kcal";

            // Berechne, welcher Smiley (1-8) gezeigt werden soll
            let percentage = (userData.steps / userData.target) * 100;
            let smileyNumber = Math.min(8, Math.max(1, Math.ceil(percentage / 12.5)));
            
            document.getElementById('mainSmiley').src = `Smiley${smileyNumber}.png`;
            renderFriends();
        }

        // 2. KORREKTUR: Freunde dynamisch darstellen
        function renderFriends() {
            const container = document.getElementById('friendsContainer');
            container.innerHTML = "";
            
            // Sortiere Freunde nach Schritten (Rangliste)
            friends.sort((a, b) => b.steps - a.steps);

            friends.forEach(friend => {
                container.innerHTML += `
                    <div class="friend-row">
                        <div class="friend-info">
                            <img src="Smiley${friend.status}.png" class="friend-avatar">
                            <span>${friend.name}</span>
                        </div>
                        <span style="font-weight:bold; color:var(--neon-gold);">${friend.steps} Pfoten</span>
                    </div>
                `;
            });
        }

        function addFriend() {
            let friendName = prompt("Gib den Namen deines Freundes ein:");
            if (friendName) {
                // Fügt neuen Freund hinzu (im echten System würde man hier einen Einladungs-Code senden)
                friends.push({
                    id: Date.now().toString(),
                    name: friendName,
                    steps: 0,
                    status: 1
                });
                renderFriends();
            }
        }

        // 3. KORREKTUR: Schwebender & frei verschiebbarer Smiley
        function toggleWidgetMode() {
            document.body.classList.toggle('widget-mode');
            alert(document.body.classList.contains('widget-mode') 
                ? "Schwebemodus aktiv! Du kannst den Smiley jetzt frei verschieben." 
                : "Zurück zur Vollansicht.");
        }

        // Touch-Steuerung zum freien Verschieben des Smileys mit dem Finger
        const smiley = document.getElementById('mainSmiley');
        let offsetX = 0, offsetY = 0, isDragging = false;

        smiley.addEventListener('touchstart', (e) => {
            if(!document.body.classList.contains('widget-mode')) return;
            isDragging = true;
            const touch = e.touches[0];
            offsetX = touch.clientX - smiley.offsetLeft;
            offsetY = touch.clientY - smiley.offsetTop;
        });

        smiley.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            smiley.style.left = (touch.clientX - offsetX) + 'px';
            smiley.style.top = (touch.clientY - offsetY) + 'px';
        });

        smiley.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Beim Start einmal ausführen
        updateUI();
    </script>
</body>
</html>
