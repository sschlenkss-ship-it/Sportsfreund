<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { margin: 0; background: #030406; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        #sportsfreund-stage { 
            position: relative; 
            width: 300px; 
            /* Hier steuern wir die leuchtende Kontur der Wolke */
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.8)); 
            transition: filter 0.5s ease;
        }
        
        #cloud-asset { width: 100%; display: block; }

        .face-layer { position: absolute; top: 20%; left: 10%; width: 80%; height: 60%; pointer-events: none; }

        /* Augen */
        .eye-group { filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
        
        /* Mund-Design: Wir definieren eine Klasse für "fröhlich" und "traurig" */
        .mouth-path { 
            stroke: #1a2233; stroke-width: 6; fill: none; stroke-linecap: round;
            transition: d 0.3s ease; 
        }
    </style>
</head>
<body>
    <div id="sportsfreund-stage" id="glow-container">
        <img id="cloud-asset" src="wolke1.png" alt="Wolke">
        
        <svg class="face-layer" viewBox="0 0 200 100">
            <g class="eye-group">
                <circle cx="60" cy="40" r="22" fill="white"/>
                <circle cx="60" cy="40" r="12" fill="#55b5ff"/>
                <circle cx="64" cy="36" r="4" fill="white" opacity="0.6"/>
            </g>
            <g class="eye-group">
                <circle cx="140" cy="40" r="22" fill="white"/>
                <circle cx="140" cy="40" r="12" fill="#55b5ff"/>
                <circle cx="144" cy="36" r="4" fill="white" opacity="0.6"/>
            </g>
            
            <path id="mouth" class="mouth-path" d="M 70,75 Q 100,90 130,75"/>
        </svg>
    </div>

    <script>
        function setEmotion(type) {
            const mouth = document.getElementById('mouth');
            const container = document.getElementById('sportsfreund-stage');
            
            if (type === 'happy') {
                mouth.setAttribute('d', 'M 70,75 Q 100,90 130,75'); // Lächelnd
                container.style.filter = 'drop-shadow(0 0 25px rgba(46, 204, 113, 0.9))'; // Grün
            } else if (type === 'sad') {
                mouth.setAttribute('d', 'M 70,85 Q 100,70 130,85'); // Traurig
                container.style.filter = 'drop-shadow(0 0 25px rgba(231, 76, 60, 0.9))'; // Rot
            }
        }
        // Teste die Emotionen:
        setTimeout(() => setEmotion('sad'), 2000);
    </script>
</body>
</html>
