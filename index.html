<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportfreund</title>
    <style>
        body { background-color: #030303; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Smiley Overlay Modus */
        #smiley-view { display: flex; align-items: center; justify-content: center; height: 100vh; }
        #smiley-display { width: 250px; cursor: pointer; filter: url(#combined-outline); }

        /* Dashboard Modus (Hidden by default) */
        #dashboard-view { display: none; padding: 20px; height: 100vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .sm-icon { width: 40px; height: 40px; filter: url(#combined-outline); }
        .header { display: flex; justify-content: space-between; align-items: center; }
        button { background: #FFD700; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<!-- SVG Filter für die Konturen -->
<svg width="0" height="0"><defs><filter id="combined-outline"><feMorphology in="SourceAlpha" result="dilated" operator="dilate" radius="5"/><feFlood id="outline-color" flood-color="#FFD700"/><feComposite in2="dilated" operator="in" result="solid-outline"/><feMerge><feMergeNode in="solid-outline"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs></svg>

<!-- Ansicht 1: Smiley -->
<div id="smiley-view">
    <img src="Smiley4.png" id="smiley-display" alt="Sportfreund" ondblclick="toggleDashboard()">
</div>

<!-- Ansicht 2: Dashboard -->
<div id="dashboard-view">
    <div class="header">
        <h1>Dein Sportfreund</h1>
        <button onclick="toggleDashboard()">Zurück</button>
    </div>
    
    <table>
        <tr><th>Status</th><th>Name</th><th>Schritte</th><th>kcal</th></tr>
        <!-- Beispiel-Freunde -->
        <tr><td><img src="Smiley1.png" class="sm-icon"></td><td>Max</td><td>15.200</td><td>850</td></tr>
        <tr><td><img src="Smiley3.png" class="sm-icon"></td><td>Anna</td><td>11.400</td><td>620</td></tr>
    </table>
    <div style="margin-top:30px;">
        <button>Einstellungen</button>
        <button>Impressum</button>
    </div>
</div>

<script>
    function toggleDashboard() {
        const smileyView = document.getElementById('smiley-view');
        const dashView = document.getElementById('dashboard-view');
        
        if (dashView.style.display === 'none' || dashView.style.display === '') {
            smileyView.style.display = 'none';
            dashView.style.display = 'block';
        } else {
            dashView.style.display = 'none';
            smileyView.style.display = 'flex';
        }
    }
</script>
</body>
</html>
