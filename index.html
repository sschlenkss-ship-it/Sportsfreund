<!DOCTYPE html>
<html lang="de">
<head>
    <style>
        body { background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        #wolke-container { position: relative; width: 400px; height: 320px; }
        
        /* Alle Layer liegen exakt übereinander */
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #mouth-layer { transition: opacity 0.3s ease; }
    </style>
</head>
<body>

    <div style="color: white; margin-bottom: 20px;">
        Schritte: <input type="number" id="stepInput" value="0" oninput="updateMood(this.value)">
    </div>

    <div id="wolke-container">
        <img src="Wolke5_blanko_023516.png" class="layer">
        <img src="Wolke2_nurAugen_023509.png" class="layer">
        <img id="mouth-layer" src="Wolke3_alles_023515.png" class="layer">
    </div>

    <script>
        function updateMood(s) {
            const mouth = document.getElementById('mouth-layer');
            // Wenn Schritte unter 2000, Mund weg (oder wir tauschen gegen ein trauriges Bild)
            if (s < 2000) {
                mouth.style.opacity = "0"; 
            } else {
                mouth.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
