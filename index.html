<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #030406; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white; }
        
        /* Simulator-Panel */
        #simulator { background: #1a2233; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #55b5ff; }
        
        #sportsfreund-stage { 
            position: relative; width: 300px;
            /* 5-fache Kontur & Schein */
            filter: drop-shadow(0 0 1px gold) drop-shadow(0 0 1px gold) drop-shadow(0 0 1px gold) 
                    drop-shadow(0 0 1px gold) drop-shadow(0 0 1px gold) drop-shadow(0 0 15px gold); 
        }
        
        #cloud-asset { width: 100%; display: block; }
        .face-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Blinzel-Animation */
        @keyframes blink {
            0%, 9%, 11%, 100% { transform: scaleY(1); }
            10% { transform: scaleY(0.1); }
        }

        .eye-group { 
            animation: blink 5s infinite; 
            transform-origin: 50% 45%; /* Drehpunkt für das Blinzeln */
        }
        
        .eye-ball { fill: white; }
        .iris { fill: #55b5ff; }
        .pupil { fill: black; }
        .shine { fill: white; opacity: 0.6; }
        .mouth-path { stroke: #1a2233; stroke-width: 6; fill: none; stroke-linecap: round; transition: d 0.3s ease; }
    </style>
</head>
<body>

    <div id="simulator">
        <label>Schritte: <input type="number" id="stepInput" value="5000" oninput="runSim()"></label>
        <label>Sport (Min): <input type="number" id="sportInput" value="0" oninput="runSim()"></label>
    </div>

    <div id="sportsfreund-stage">
        <img id="cloud-asset" src="wolke1.png" alt="Sportsfreund">
        
        <svg class="face-layer" viewBox="0 0 200 100">
            <g class="eye-group">
                <circle cx="65" cy="45" r="24" class="eye-ball"/>
                <circle cx="65" cy="45" r="14" class="iris"/>
                <circle cx="68" cy="42" r="6" class="pupil"/>
                <circle cx="70" cy="39" r="3" class="shine"/>
            </g>
            <g class="eye-group">
                <circle cx="135" cy="45" r="24" class="eye-ball"/>
                <circle cx="135" cy="45" r="14" class="iris"/>
                <circle cx="138" cy="42" r="6" class="pupil"/>
                <circle cx="140" cy="39" r="3" class="shine"/>
            </g>
            <path id="mouth" class="mouth-path" d="M 70,80 Q 100,95 130,80"/>
        </svg>
    </div>

    <script>
        function runSim() {
            const steps = parseInt(document.getElementById('stepInput').value);
            const sport = parseInt(document.getElementById('sportInput').value);
            const mouth = document.getElementById('mouth');
            
            let score = (steps / 1000) + (sport * 0.5);
            
            if (score >= 12) {
                mouth.setAttribute('d', 'M 70,70 Q 100,95 130,70'); 
            } else if (score >= 6) {
                mouth.setAttribute('d', 'M 70,80 Q 100,95 130,80'); 
            } else {
                mouth.setAttribute('d', 'M 70,85 Q 100,70 130,85'); 
            }
        }
    </script>
</body>
</html>
