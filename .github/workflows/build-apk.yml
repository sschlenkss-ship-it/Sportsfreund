name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Umgebungen
        uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Vorbereitung der Web-Struktur
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || echo "<html><body>App</body></html>" > www/index.html

      - name: Projekt setup & Capacitor Sync
        run: |
          npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0
          npx cap init Sportfreund de.sportfreund.app --web-dir www
          npx cap add android
          npx cap sync android
          
      - name: Java Injektion (MainActivity)
        run: |
          mkdir -p android/app/src/main/java/de/sportfreund/app
          echo 'package de.sportfreund.app;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {}' > android/app/src/main/java/de/sportfreund/app/MainActivity.java

      - name: APK bauen
        run: |
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sportfreund-app
          path: android/app/build/outputs/apk/debug/app-debug.apk

