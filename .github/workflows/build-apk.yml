name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java & Node installieren
        uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Projekt setup
        run: |
          npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0
          npx cap add android
          
      - name: Dateien injizieren
        run: |
          node -e '
            const fs = require("fs");
            const path = "android/app/src/main/java/de/sportfreund/app";
            fs.mkdirSync(path, { recursive: true });
            
            const mainActivity = `package de.sportfreund.app;
            import android.content.Intent;
            import android.net.Uri;
            import android.os.Build;
            import android.os.Bundle;
            import android.provider.Settings;
            import android.webkit.JavascriptInterface;
            import com.getcapacitor.BridgeActivity;
            public class MainActivity extends BridgeActivity {
                @Override
                public void onCreate(Bundle savedInstanceState) {
                    super.onCreate(savedInstanceState);
                    this.bridge.getWebView().addJavascriptInterface(new Object() {
                        @JavascriptInterface public String getSteps() { return "14320"; }
                        @JavascriptInterface public void triggerPermissionRequest() {}
                        @JavascriptInterface public void startFloatingWidget() {}
                    }, "Android");
                }
            }`;
            fs.writeFileSync(path + "/MainActivity.java", mainActivity);
            console.log("Java Dateien injiziert.");
          '

      - name: APK bauen
        run: |
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sportfreund-app
          path: android/app/build/outputs/apk/debug/app-debug.apk

