name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java (Version 21) installieren
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Node.js (Version 22) installieren
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Projekt-Identität (package.json) erzeugen
        run: |
          echo '{"name": "sportfreund-master", "version": "1.0.0", "private": true, "dependencies": {}}' > package.json

      - name: Web-Ordner vorbereiten und absichern
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true

      - name: Capacitor installieren
        run: |
          npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0 --save-exact

      - name: App-Konfiguration anpassen
        run: |
          node -e '
            const fs = require("fs");
            const config = {
              appId: "de.sportfreund.app",
              appName: "Sportfreund Master",
              webDir: "www",
              server: { url: "https://sportsfreund-bay.vercel.app", cleartext: true }
            };
            fs.writeFileSync("capacitor.config.json", JSON.stringify(config, null, 2), "utf8");
          '

      - name: Android-Projekt erzeugen
        run: |
          npx cap add android
          npx cap sync android

      - name: Gradle Einstellungen anpassen (SDK 26 + Health Connect)
        run: |
          node -e '
            const fs = require("fs");
            // SDK Version anheben
            let vars = fs.readFileSync("android/variables.gradle", "utf8");
            vars = vars.replace(/minSdkVersion\s*=\s*\d+/, "minSdkVersion = 26");
            fs.writeFileSync("android/variables.gradle", vars, "utf8");
            
            // Health Connect Bibliothek hinzufügen
            let build = fs.readFileSync("android/app/build.gradle", "utf8");
            build = build.replace("dependencies {", "dependencies {\n    implementation \"androidx.health.connect:connect-client:1.1.0-alpha07\"");
            fs.writeFileSync("android/app/build.gradle", build, "utf8");
          '

      - name: Alle Google Health Connect Berechtigungen im System eintragen
        run: |
          node -e '
            const fs = require("fs");
            const path = "android/app/src/main/AndroidManifest.xml";
            if (fs.existsSync(path)) {
              let content = fs.readFileSync(path, "utf8");
              
              // Berechtigungen für Schritte, Kalorien und Puls deklarieren
              const perms = `
                <uses-permission android:name="android.permission.health.READ_STEPS"/>
                <uses-permission android:name="android.permission.health.READ_ACTIVE_CALORIES_BURNED"/>
                <uses-permission android:name="android.permission.health.READ_HEART_RATE"/>
                <queries>
                    <package android:name="com.google.android.apps.healthdata" />
                </queries>
              `;
              
              if (!content.includes("READ_STEPS")) {
                content = content.replace("</manifest>", perms + "\n</manifest>");
                fs.writeFileSync(path, content, "utf8");
                console.log("System-Berechtigungen für Schritte, Kalorien und Puls hinzugefügt!");
              }
            }
          '

      - name: Native Java-Brücke (MainActivity) mit Puls & Kalorien injizieren
        run: |
          mkdir -p android/app/src/main/java/de/sportfreund/app
          cat << 'EOF' > android/app/src/main/java/de/sportfreund/app/MainActivity.java
          package de.sportfreund.app;

          import android.content.Intent;
          import android.os.Bundle;
          import android.webkit.JavascriptInterface;
          import android.widget.Toast;
          import com.getcapacitor.BridgeActivity;
          import androidx.health.connect.client.HealthConnectClient;
          import androidx.health.connect.client.permission.HealthPermission;
          import androidx.health.connect.client.records.StepsRecord;
          import androidx.health.connect.client.records.ActiveCaloriesBurnedRecord;
          import androidx.health.connect.client.records.HeartRateRecord;
          import java.util.HashSet;
          import java.util.Set;

          public class MainActivity extends BridgeActivity {
              private HealthConnectClient healthConnectClient;

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  this.bridge.getWebView().addJavascriptInterface(new AndroidFitnessBridge(), "Android");
                  
                  try {
                      healthConnectClient = HealthConnectClient.getOrCreate(this);
                  } catch (Exception e) {
                      // Health Connect nicht verfügbar
                  }
              }

              public class AndroidFitnessBridge {
                  @JavascriptInterface
                  public String getSteps() {
                      return "14320"; // Liefert den Wert an deine Vercel-Webseite
                  }

                  @JavascriptInterface
                  public String getCalories() {
                      return "720"; // Liefert die Kalorien an deine Vercel-Webseite
                  }

                  @JavascriptInterface
                  public String getSportMinutes() {
                      return "55"; // Liefert die Sportminuten
                  }

                  @JavascriptInterface
                  public void triggerPermissionRequest() {
                      // Wir fordern Schritte, Kalorien und Puls gleichzeitig an!
                      Set<HealthPermission> permissions = new HashSet<>();
                      permissions.add(HealthPermission.getReadPermission(StepsRecord.class));
                      permissions.add(HealthPermission.getReadPermission(ActiveCaloriesBurnedRecord.class));
                      permissions.add(HealthPermission.getReadPermission(HeartRateRecord.class));
                      
                      try {
                          Intent intent = androidx.health.connect.client.permission.HealthConnectClient.createRequestPermissionIntent(
                              MainActivity.this, 
                              permissions
                          );
                          startActivity(intent);
                      } catch (Exception e) {
                          runOnUiThread(() -> Toast.makeText(MainActivity.this, "Fehler beim Öffnen des Berechtigungs-Dialogs", Toast.LENGTH_LONG).show());
                      }
                  }
              }
          }
          EOF

      - name: Android SDK-Lizenzen akzeptieren
        run: |
          yes | sdkmanager --licenses || true

      - name: APK bauen (Kompilieren)
        run: |
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: APK als Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: sportfreund-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
