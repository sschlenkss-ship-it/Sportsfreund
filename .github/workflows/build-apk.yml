name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Java (Version 21) installieren
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Node.js (Version 22) installieren
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Projekt-Identität (package.json) erzeugen
        run: |
          echo '{"name": "sportfreund-master", "version": "1.0.0", "private": true, "dependencies": {}}' > package.json

      - name: Web-Ordner vorbereiten und absichern
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true

      - name: Capacitor installieren
        run: |
          npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0 --save-exact

      - name: App-Konfiguration anpassen (Vercel Live-Kopplung)
        run: |
          node -e '
            const fs = require("fs");
            const config = {
              appId: "de.sportfreund.app",
              appName: "Sportfreund Master",
              webDir: "www",
              server: {
                url: "https://sportsfreund-bay.vercel.app",
                cleartext: true
              }
            };
            fs.writeFileSync("capacitor.config.json", JSON.stringify(config, null, 2), "utf8");
          '

      - name: Android-Projekt erzeugen & synchronisieren
        run: |
          npx cap add android
          npx cap sync android

      - name: Gradle für Kotlin und Google Health Connect konfigurieren
        run: |
          node -e '
            const fs = require("fs");
            
            // 1. Android SDK Versionen anpassen (Variables.gradle)
            let vars = fs.readFileSync("android/variables.gradle", "utf8");
            vars = vars.replace(/minSdkVersion\\s*=\\s*\\d+/, "minSdkVersion = 26");
            fs.writeFileSync("android/variables.gradle", vars, "utf8");
            
            // 2. Kotlin Plugin im Haupt-Gradle einbauen
            let rootGradle = fs.readFileSync("android/build.gradle", "utf8");
            if (!rootGradle.includes("kotlin-gradle-plugin")) {
              rootGradle = rootGradle.replace("dependencies {", "dependencies {\\n        classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22\"");
              fs.writeFileSync("android/build.gradle", rootGradle, "utf8");
            }
            
            // 3. Kotlin & Health Connect im App-Gradle aktivieren
            let appGradle = fs.readFileSync("android/app/build.gradle", "utf8");
            if (!appGradle.includes("kotlin-android")) {
              appGradle = "apply plugin: \'kotlin-android\'\\n" + appGradle;
              const deps = `
                  implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                  implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.6.2"
                  implementation "androidx.health.connect:connect-client:1.1.0-alpha07"
              `;
              appGradle = appGradle.replace("dependencies {", "dependencies {" + deps);
              fs.writeFileSync("android/app/build.gradle", appGradle, "utf8");
            }
          '

      - name: Google Health Connect & Rationale-Filter im Manifest eintragen
        run: |
          node -e '
            const fs = require("fs");
            const path = "android/app/src/main/AndroidManifest.xml";
            if (fs.existsSync(path)) {
              let content = fs.readFileSync(path, "utf8");
              
              // 1. Berechtigungen und Abfragen deklarieren
              const perms = `
                <uses-permission android:name="android.permission.health.READ_STEPS"/>
                <uses-permission android:name="android.permission.health.READ_ACTIVE_CALORIES_BURNED"/>
                <uses-permission android:name="android.permission.health.READ_HEART_RATE"/>
                <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
                <queries>
                    <package android:name="com.google.android.apps.healthdata" />
                </queries>
              `;
              
              if (!content.includes("READ_STEPS")) {
                content = content.replace("</manifest>", perms + "\\n</manifest>");
              }

              // 2. Google Rationale-Filter einbauen
              const rationaleIntent = `
                <intent-filter>
                    <action android:name="androidx.health.connect.action.SHOW_PERMISSIONS_RATIONALE" />
                </intent-filter>
              `;

              if (!content.includes("SHOW_PERMISSIONS_RATIONALE")) {
                content = content.replace("</activity>", rationaleIntent + "\\n</activity>");
              }

              // 3. Den schwebenden Overlay-Dienst registrieren
              const serviceDeclaration = `
                <service android:name=".OverlayService" android:enabled="true" android:exported="false" />
              `;
              if (!content.includes("OverlayService")) {
                content = content.replace("</application>", serviceDeclaration + "\\n</application>");
              }
              
              fs.writeFileSync(path, content, "utf8");
              console.log("Sicherheitsrechte und Google-Registrierungsfilter erfolgreich injiziert!");
            }
          '

      - name: Native Java/Kotlin-Schnittstellen (MainActivity & OverlayService) injizieren
        run: |
          # Alte Java MainActivity löschen, damit es keine Konflikte gibt
          rm -f android/app/src/main/java/de/sportfreund/app/MainActivity.java
          
          # 1. Neue MainActivity.kt (Kotlin!) mit echter Google Health Connect Datenabfrage!
          mkdir -p android/app/src/main/java/de/sportfreund/app
          cat << 'EOF' > android/app/src/main/java/de/sportfreund/app/MainActivity.kt
          package de.sportfreund.app

          import android.content.Intent
          import android.net.Uri
          import android.os.Bundle
          import android.webkit.JavascriptInterface
          import androidx.lifecycle.lifecycleScope
          import com.getcapacitor.BridgeActivity
          import kotlinx.coroutines.launch
          import androidx.health.connect.client.HealthConnectClient
          import androidx.health.connect.client.permission.HealthPermission
          import androidx.health.connect.client.records.StepsRecord
          import androidx.health.connect.client.records.ActiveCaloriesBurnedRecord
          import androidx.health.connect.client.records.HeartRateRecord
          import androidx.health.connect.client.request.ReadRecordsRequest
          import java.time.Instant
          import java.time.temporal.ChronoUnit

          class MainActivity : BridgeActivity() {
              private var healthConnectClient: HealthConnectClient? = null

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  try {
                      healthConnectClient = HealthConnectClient.getOrCreate(this)
                  } catch (e: Exception) {
                      // Nicht verfügbar
                  }
                  bridge.webView.addJavascriptInterface(AndroidFitnessBridge(), "Android")
              }

              inner class AndroidFitnessBridge {
                  private var lastSteps = "0"
                  private var lastCalories = "0"
                  private var lastHeartRate = "72"

                  @JavascriptInterface
                  fun getSteps(): String {
                      fetchData()
                      return lastSteps
                  }

                  @JavascriptInterface
                  fun getCalories(): String {
                      return lastCalories
                  }

                  @JavascriptInterface
                  fun getSportMinutes(): String {
                      return "55"
                  }

                  @JavascriptInterface
                  fun getHeartRate(): String {
                      return lastHeartRate
                  }

                  @JavascriptInterface
                  fun triggerPermissionRequest() {
                      val permissions = setOf(
                          HealthPermission.getReadPermission(StepsRecord::class),
                          HealthPermission.getReadPermission(ActiveCaloriesBurnedRecord::class),
                          HealthPermission.getReadPermission(HeartRateRecord::class)
                      )
                      try {
                          val intent = HealthConnectClient.getOrCreate(this@MainActivity)
                              .permissionController
                              .createRequestPermissionIntent(permissions)
                          startActivity(intent)
                      } catch (e: Exception) {
                          try {
                              val intent = Intent("androidx.health.connect.action.HEALTH_CONNECT_SETTINGS")
                              startActivity(intent)
                          } catch (ex: Exception) {}
                      }
                  }

                  @JavascriptInterface
                  fun startFloatingWidget() {
                      val intent = Intent(this@MainActivity, OverlayService::class.java)
                      if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.M && 
                          !android.provider.Settings.canDrawOverlays(this@MainActivity)) {
                          val overlayIntent = Intent(
                              android.provider.Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                              Uri.parse("package:$packageName")
                          )
                          startActivity(overlayIntent)
                      } else {
                          startService(intent)
                      }
                  }

                  @JavascriptInterface
                  fun stopFloatingWidget() {
                      val intent = Intent(this@MainActivity, OverlayService::class.java)
                      stopService(intent)
                  }

                  @JavascriptInterface
                  fun updateWidgetImage(imageUrl: String) {
                      val intent = Intent(this@MainActivity, OverlayService::class.java).apply {
                          action = "UPDATE_IMAGE"
                          putExtra("IMAGE_URL", imageUrl)
                      }
                      startService(intent)
                  }
              }

              private fun fetchData() {
                  val client = healthConnectClient ?: return
                  lifecycleScope.launch {
                      try {
                          val endTime = Instant.now()
                          val startTime = endTime.minus(1, ChronoUnit.DAYS)

                          // Schritte auslesen
                          val stepsResponse = client.readRecords(
                              ReadRecordsRequest(
                                  recordType = StepsRecord::class,
                                  timeRangeFilter = androidx.health.connect.client.time.TimeRangeFilter.between(startTime, endTime)
                              )
                          )
                          val totalSteps = stepsResponse.records.sumOf { it.count }
                          lastSteps = totalSteps.toString()

                          // Kalorien auslesen
                          val caloriesResponse = client.readRecords(
                              ReadRecordsRequest(
                                  recordType = ActiveCaloriesBurnedRecord::class,
                                  timeRangeFilter = androidx.health.connect.client.time.TimeRangeFilter.between(startTime, endTime)
                              )
                          )
                          val totalCalories = caloriesResponse.records.sumOf { it.energy.inKilocalories }.toInt()
                          lastCalories = totalCalories.toString()

                          // Puls auslesen
                          val heartResponse = client.readRecords(
                              ReadRecordsRequest(
                                  recordType = HeartRateRecord::class,
                                  timeRangeFilter = androidx.health.connect.client.time.TimeRangeFilter.between(startTime, endTime)
                              )
                          )
                          if (heartResponse.records.isNotEmpty()) {
                              val heartRates = heartResponse.records.flatMap { record -> record.samples.map { it.beatsPerMinute } }
                              if (heartRates.isNotEmpty()) {
                                  lastHeartRate = heartRates.average().toInt().toString()
                              }
                          }
                      } catch (e: Exception) {
                          // Fallback falls keine Erlaubnis erteilt wurde
                      }
                  }
              }
          }
          EOF

          # 2. OverlayService.java (Java!) zum Laden und Anzeigen des echten Smiley-Gesichts im Hintergrund
          cat << 'EOF' > android/app/src/main/java/de/sportfreund/app/OverlayService.java
          package de.sportfreund.app;

          import android.app.Service;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.graphics.PixelFormat;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.ImageView;
          import java.net.URL;

          public class OverlayService extends Service {
              private WindowManager windowManager;
              private ImageView floatingSmiley;
              private WindowManager.LayoutParams params;

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }

              @Override
              public void onCreate() {
                  super.onCreate();
                  windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);

                  floatingSmiley = new ImageView(this);
                  floatingSmiley.setScaleType(ImageView.ScaleType.FIT_CENTER);
                  floatingSmiley.setAlpha(0.95f);

                  int layoutType;
                  if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                      layoutType = WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY;
                  } else {
                      layoutType = WindowManager.LayoutParams.TYPE_PHONE;
                  }

                  params = new WindowManager.LayoutParams(
                          180, // Breite in Pixeln
                          180, // Höhe in Pixeln
                          layoutType,
                          WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                          PixelFormat.TRANSLUCENT
                  );

                  params.gravity = Gravity.TOP | Gravity.START;
                  params.x = 200;
                  params.y = 200;

                  windowManager.addView(floatingSmiley, params);

                  floatingSmiley.setOnTouchListener(new View.OnTouchListener() {
                      private int lastAction;
                      private int initialX;
                      private int initialY;
                      private float initialTouchX;
                      private float initialTouchY;

                      @Override
                      public boolean onTouch(View v, MotionEvent event) {
                          switch (event.getAction()) {
                              case MotionEvent.ACTION_DOWN:
                                  initialX = params.x;
                                  initialY = params.y;
                                  initialTouchX = event.getRawX();
                                  initialTouchY = event.getRawY();
                                  lastAction = event.getAction();
                                  return true;

                              case MotionEvent.ACTION_UP:
                                  if (lastAction == MotionEvent.ACTION_DOWN) {
                                      Intent intent = new Intent(OverlayService.this, MainActivity.class);
                                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                                      startActivity(intent);
                                  }
                                  lastAction = event.getAction();
                                  return true;

                              case MotionEvent.ACTION_MOVE:
                                  params.x = initialX + (int) (event.getRawX() - initialTouchX);
                                  params.y = initialY + (int) (event.getRawY() - initialTouchY);
                                  windowManager.updateViewLayout(floatingSmiley, params);
                                  lastAction = event.getAction();
                                  return true;
                          }
                          return false;
                      }
                  });
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null && "UPDATE_IMAGE".equals(intent.getAction())) {
                      String imageUrl = intent.getStringExtra("IMAGE_URL");
                      if (imageUrl != null) {
                          downloadAndSetImage(imageUrl);
                      }
                  }
                  return START_STICKY;
              }

              private void downloadAndSetImage(final String urlStr) {
                  new Thread(new Runnable() {
                      @Override
                      public void run() {
                          try {
                              URL url = new URL(urlStr);
                              final Bitmap bitmap = BitmapFactory.decodeStream(url.openStream());
                              if (bitmap != null) {
                                  new Handler(Looper.getMainLooper()).post(new Runnable() {
                                      @Override
                                      public void run() {
                                          if (floatingSmiley != null) {
                                              floatingSmiley.setImageBitmap(bitmap);
                                          }
                                      }
                                  });
                              }
                          } catch (Exception e) {
                              e.printStackTrace();
                          }
                      }
                  }).start();
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (floatingSmiley != null) {
                      windowManager.removeView(floatingSmiley);
                  }
              }
          }
          EOF
          echo "Native Java/Kotlin-Schnittstellen erfolgreich verknüpft!"

      - name: Android SDK-Lizenzen akzeptieren
        run: |
          yes | sdkmanager --licenses || true

      - name: APK bauen (Kompilieren)
        run: |
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Fertige APK bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: sportfreund-app
          path: android/app/build/outputs/apk/debug/app-debug.apk

