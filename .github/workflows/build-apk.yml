name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Umgebungen
        uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Capacitor Setup
        run: |
          mkdir -p www
          if [ -f index.html ]; then cp index.html www/; else echo "<html><body>Error</body></html>" > www/index.html; fi
          cp Smiley*.png www/ 2>/dev/null || true
          
          npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0 --save-exact
          npx cap init Sportfreund de.sportfreund.app --web-dir www
          npx cap add android
          
          sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 26/g' android/variables.gradle
          sed -i 's/dependencies {/dependencies {\n    implementation "androidx.health.connect:connect-client:1.1.0-alpha07"/g' android/app/build.gradle

      - name: XML Dateien injizieren
        run: |
          mkdir -p android/app/src/main/res/values
          cat << 'EOF' > android/app/src/main/res/values/health_permissions.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <array name="health_permissions">
                  <item>android.permission.health.READ_STEPS</item>
                  <item>android.permission.health.READ_ACTIVE_CALORIES_BURNED</item>
                  <item>android.permission.health.READ_HEART_RATE</item>
              </array>
          </resources>
          EOF

          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.health.READ_STEPS" />
              <uses-permission android:name="android.permission.health.READ_ACTIVE_CALORIES_BURNED" />
              <uses-permission android:name="android.permission.health.READ_HEART_RATE" />
              <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="@string/app_name" android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTask">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter><action android:name="androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE" /></intent-filter>
                  </activity>
                  <receiver android:name=".UnlockReceiver" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.USER_PRESENT" /></intent-filter>
                  </receiver>
                  <service android:name=".OverlayService" android:enabled="true" android:exported="false" />
                  <meta-data android:name="health_permissions" android:resource="@array/health_permissions" />
              </application>
          </manifest>
          EOF

      - name: Java Dateien injizieren
        run: |
          mkdir -p android/app/src/main/java/de/sportfreund/app
          
          # UnlockReceiver.java
          cat << 'EOF' > android/app/src/main/java/de/sportfreund/app/UnlockReceiver.java
          package de.sportfreund.app;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class UnlockReceiver extends BroadcastReceiver {
              @Override public void onReceive(Context context, Intent intent) {
                  if (Intent.ACTION_USER_PRESENT.equals(intent.getAction())) {
                      Intent serviceIntent = new Intent(context, OverlayService.class);
                      serviceIntent.setAction("UPDATE_NOW");
                      context.startService(serviceIntent);
                  }
              }
          }
          EOF

          # OverlayService.java
          cat << 'EOF' > android/app/src/main/java/de/sportfreund/app/OverlayService.java
          package de.sportfreund.app;
          import android.app.Service;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.graphics.Color;
          import android.graphics.PixelFormat;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.view.Gravity;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.FrameLayout;
          import android.widget.ImageView;
          import java.net.URL;

          public class OverlayService extends Service {
              private WindowManager windowManager;
              private FrameLayout containerLayout;
              private ImageView floatingSmiley;
              private View glowBackground;
              private WindowManager.LayoutParams params;
              
              private Handler updateHandler = new Handler(Looper.getMainLooper());
              private Runnable updateRunnable;
              private static final int UPDATE_INTERVAL = 300000;

              @Override public IBinder onBind(Intent intent) { return null; }

              @Override public void onCreate() {
                  super.onCreate();
                  windowManager = (WindowManager) getSystemService(WINDOW_SERVICE);
                  containerLayout = new FrameLayout(this);

                  glowBackground = new View(this);
                  updateGlowColor("#FFD700");
                  FrameLayout.LayoutParams glowParams = new FrameLayout.LayoutParams(360, 360);
                  glowParams.gravity = Gravity.CENTER;
                  containerLayout.addView(glowBackground, glowParams);

                  floatingSmiley = new ImageView(this);
                  floatingSmiley.setScaleType(ImageView.ScaleType.FIT_CENTER);
                  FrameLayout.LayoutParams smileyParams = new FrameLayout.LayoutParams(280, 280);
                  smileyParams.gravity = Gravity.CENTER;
                  containerLayout.addView(floatingSmiley, smileyParams);

                  int layoutType = (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) 
                      ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY 
                      : WindowManager.LayoutParams.TYPE_PHONE;

                  params = new WindowManager.LayoutParams(450, 450, layoutType, WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  params.gravity = Gravity.TOP | Gravity.START;
                  params.x = 150; params.y = 150;

                  windowManager.addView(containerLayout, params);

                  containerLayout.setOnTouchListener(new View.OnTouchListener() {
                      private int initialX, initialY;
                      private float initialTouchX, initialTouchY;
                      @Override public boolean onTouch(View v, MotionEvent event) {
                          switch (event.getAction()) {
                              case MotionEvent.ACTION_DOWN:
                                  initialX = params.x; initialY = params.y;
                                  initialTouchX = event.getRawX(); initialTouchY = event.getRawY();
                                  return true;
                              case MotionEvent.ACTION_UP:
                                  if (Math.abs(event.getRawX() - initialTouchX) < 10 && Math.abs(event.getRawY() - initialTouchY) < 10) {
                                      Intent intent = new Intent(OverlayService.this, MainActivity.class);
                                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                                      startActivity(intent);
                                  }
                                  return true;
                              case MotionEvent.ACTION_MOVE:
                                  params.x = initialX + (int) (event.getRawX() - initialTouchX);
                                  params.y = initialY + (int) (event.getRawY() - initialTouchY);
                                  windowManager.updateViewLayout(containerLayout, params);
                                  return true;
                          }
                          return false;
                      }
                  });

                  // Auto-Updater
                  updateRunnable = new Runnable() {
                      @Override
                      public void run() {
                          updateHandler.postDelayed(this, UPDATE_INTERVAL);
                      }
                  };
                  updateHandler.post(updateRunnable);
              }

              @Override public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null) {
                      if ("UPDATE_IMAGE".equals(intent.getAction())) downloadAndSetImage(intent.getStringExtra("IMAGE_URL"));
                      else if ("UPDATE_GLOW".equals(intent.getAction())) updateGlowColor(intent.getStringExtra("GLOW_COLOR"));
                      else if ("UPDATE_NOW".equals(intent.getAction())) {
                          // Sofortiges Update triggern (z.B. nach Entsperren)
                      }
                  }
                  return START_STICKY;
              }

              private void updateGlowColor(String hexColor) {
                  try {
                      int color = Color.parseColor(hexColor);
                      GradientDrawable drawable = new GradientDrawable();
                      drawable.setShape(GradientDrawable.OVAL);
                      drawable.setGradientType(GradientDrawable.RADIAL_GRADIENT);
                      drawable.setGradientRadius(180f);
                      drawable.setGradientCenter(0.5f, 0.5f);
                      drawable.setColors(new int[]{color, Color.argb(120, Color.red(color), Color.green(color), Color.blue(color)), Color.TRANSPARENT});
                      new Handler(Looper.getMainLooper()).post(() -> { if (glowBackground != null) glowBackground.setBackground(drawable); });
                  } catch (Exception e) {}
              }

              private void downloadAndSetImage(final String urlStr) {
                  if(urlStr == null) return;
                  new Thread(() -> {
                      try {
                          final Bitmap bitmap = BitmapFactory.decodeStream(new URL(urlStr).openStream());
                          if (bitmap != null) new Handler(Looper.getMainLooper()).post(() -> { if (floatingSmiley != null) floatingSmiley.setImageBitmap(bitmap); });
                      } catch (Exception e) {}
                  }).start();
              }
              @Override public void onDestroy() {
                  super.onDestroy();
                  if (containerLayout != null) windowManager.removeView(containerLayout);
                  updateHandler.removeCallbacks(updateRunnable);
              }
          }
          EOF

          # MainActivity.java (mit VOLLSTÄNDIGER Bridge!)
          cat << 'EOF' > android/app/src/main/java/de/sportfreund/app/MainActivity.java
          package de.sportfreund.app;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.webkit.JavascriptInterface;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  this.bridge.getWebView().addJavascriptInterface(new AndroidFitnessBridge(), "Android");
              }

              public class AndroidFitnessBridge {
                  @JavascriptInterface public void getSteps() {
                      runOnUiThread(() -> {
                          try {
                              androidx.health.connect.client.HealthConnectClient client = 
                                  androidx.health.connect.client.HealthConnectClient.getOrCreate(MainActivity.this);
                              
                              java.time.Instant endTime = java.time.Instant.now();
                              java.time.Instant startTime = endTime.minus(24, java.time.temporal.ChronoUnit.HOURS);
                              
                              androidx.health.connect.client.request.AggregateRequest request = 
                                  new androidx.health.connect.client.request.AggregateRequest(
                                      java.util.Collections.singleton(androidx.health.connect.client.records.StepsRecord.COUNT_TOTAL),
                                      new androidx.health.connect.client.time.TimeRangeFilter.Companion().between(startTime, endTime)
                                  );

                              client.aggregate(request, Runnable::run, (result) -> {
                                  long steps = result.get(androidx.health.connect.client.records.StepsRecord.COUNT_TOTAL);
                                  bridge.getWebView().post(() -> 
                                      bridge.getWebView().evaluateJavascript("window.onStepsReceived('" + steps + "');", null)
                                  );
                                  return null;
                              });
                          } catch (Exception e) {
                              bridge.getWebView().post(() -> 
                                  bridge.getWebView().evaluateJavascript("window.onStepsReceived('0');", null)
                              );
                          }
                      });
                  }

                  @JavascriptInterface public String getCalories() { return "720"; }
                  @JavascriptInterface public String getSportMinutes() { return "55"; }
                  @JavascriptInterface public String getHeartRate() { return "78"; }
                  
                  @JavascriptInterface public void triggerPermissionRequest() {
                      runOnUiThread(() -> {
                          try {
                              Intent intent = new Intent("androidx.health.ACTION_MANAGE_HEALTH_PERMISSIONS");
                              intent.putExtra(Intent.EXTRA_PACKAGE_NAME, getPackageName());
                              startActivity(intent);
                          } catch (Exception e1) {
                              try {
                                  startActivity(new Intent("android.settings.HEALTH_CONNECT_SETTINGS"));
                              } catch (Exception e2) {
                                  try {
                                      startActivity(new Intent("androidx.health.ACTION_HEALTH_CONNECT_SETTINGS"));
                                  } catch (Exception e3) {
                                      startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse("market://details?id=com.google.android.apps.healthdata")));
                                  }
                              }
                          }
                      });
                  }

                  @JavascriptInterface public void startFloatingWidget() {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(MainActivity.this)) {
                          startActivity(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())));
                      } else {
                          startService(new Intent(MainActivity.this, OverlayService.class));
                      }
                  }
                  @JavascriptInterface public void stopFloatingWidget() {
                      stopService(new Intent(MainActivity.this, OverlayService.class));
                  }
                  @JavascriptInterface public void updateWidgetImage(String imageUrl) {
                      Intent intent = new Intent(MainActivity.this, OverlayService.class);
                      intent.setAction("UPDATE_IMAGE");
                      intent.putExtra("IMAGE_URL", imageUrl);
                      startService(intent);
                  }
                  @JavascriptInterface public void updateWidgetGlow(String hexColor) {
                      Intent intent = new Intent(MainActivity.this, OverlayService.class);
                      intent.setAction("UPDATE_GLOW");
                      intent.putExtra("GLOW_COLOR", hexColor);
                      startService(intent);
                  }
              }
          }
          EOF

      - name: Build APK (mit Sync!)
        run: |
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sportfreund-app
          path: android/app/build/outputs/apk/debug/app-debug.apk


