name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Projekt-Struktur vorbereiten
        run: |
          mkdir -p www
          if [ ! -f index.html ]; then echo "<html><body>App</body></html>" > index.html; fi
          cp index.html www/
          npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0
          npx cap init Sportfreund de.sportfreund.app --web-dir www
          npx cap add android

      - name: System-Patch & Java-Injektion
        run: |
          node -e '
            const fs = require("fs");
            
            // 1. Manifest patchen
            const path = "android/app/src/main/AndroidManifest.xml";
            let xml = fs.readFileSync(path, "utf8");
            const permissions = `<uses-permission android:name="android.permission.health.READ_STEPS"/>
            <uses-permission android:name="android.permission.health.READ_ACTIVE_CALORIES_BURNED"/>
            <uses-permission android:name="android.permission.health.READ_HEART_RATE"/>
            <queries>
                <package android:name="com.google.android.apps.healthdata" />
            </queries>`;
            xml = xml.replace("<application", permissions + "\n    <application");
            fs.writeFileSync(path, xml);

            // 2. MainActivity schreiben
            const java = `package de.sportfreund.app;
            import android.content.Intent;
            import android.net.Uri;
            import android.webkit.JavascriptInterface;
            import com.getcapacitor.BridgeActivity;
            public class MainActivity extends BridgeActivity {
                @JavascriptInterface public void triggerPermissionRequest() {
                    try {
                        Intent intent = new Intent("androidx.health.connect.action.REQUEST_PERMISSIONS");
                        intent.putExtra("androidx.health.connect.extra.PERMISSION_ARRAY", new String[]{
                            "android.permission.health.READ_STEPS",
                            "android.permission.health.READ_ACTIVE_CALORIES_BURNED",
                            "android.permission.health.READ_HEART_RATE"
                        });
                        startActivity(intent);
                    } catch (Exception e) {
                        startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse("market://details?id=com.google.android.apps.healthdata")));
                    }
                }
            }`;
            fs.writeFileSync("android/app/src/main/java/de/sportfreund/app/MainActivity.java", java);
          '

      - name: Build APK
        run: |
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sportfreund-app
          path: android/app/build/outputs/apk/debug/app-debug.apk

